<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SNS投稿ジェネレーター — 月読みワンダーランド</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0b1f;--bg2:#1b1233;
  --gold:#d8b56d;--gold2:#f1d99b;
  --white:#fffaf2;--muted:#c9bde0;
  --line:rgba(241,217,155,.28);--card:rgba(255,255,255,.06);
  --green:#7abda8;--red:#ff9090;
}
body{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
  color:var(--white);background:var(--bg);min-height:100vh;line-height:1.85}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle,rgba(255,255,255,.9) 0 1px,transparent 1.5px),
    radial-gradient(circle,rgba(241,217,155,.7) 0 1px,transparent 1.5px),
    radial-gradient(circle,rgba(255,255,255,.6) 0 1px,transparent 1.5px);
  background-size:241px 213px,313px 277px,187px 163px;
  background-position:12% 20%,58% 64%,83% 35%;opacity:.4}
.wrap{max-width:700px;margin:0 auto;padding:48px 16px 72px;position:relative;z-index:1}
@media(max-width:480px){
  .wrap{padding:28px 14px 60px}
}

/* ── ヘッダー ── */
.header{text-align:center;margin-bottom:32px}
.header .kicker{font-size:11px;letter-spacing:.35em;color:var(--gold);margin-bottom:10px}
.header h1{font-size:clamp(20px,5vw,32px);color:var(--gold2);letter-spacing:.08em}
.header .today{font-size:13px;color:var(--muted);margin-top:8px;letter-spacing:.06em}

/* ── 設定パネル ── */
.panel{background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:22px;margin-bottom:22px;backdrop-filter:blur(6px)}
@media(max-width:480px){.panel{padding:16px;border-radius:16px}}
.field{margin-bottom:20px}
.field:last-child{margin-bottom:0}
label{display:block;font-size:12px;letter-spacing:.15em;color:var(--gold);margin-bottom:8px}
select,input{
  width:100%;padding:14px 16px;border-radius:12px;
  border:1px solid var(--line);background:rgba(255,255,255,.08);
  color:var(--white);font-size:16px;font-family:inherit;outline:none;
  -webkit-appearance:none;appearance:none;
}
select:focus,input:focus{border-color:rgba(241,217,155,.6)}
select option{background:#1b1233;color:#fff}

/* プラットフォームトグル */
.toggle-wrap{display:flex;gap:10px}
.toggle-btn{
  flex:1;padding:13px 8px;border-radius:12px;border:1px solid var(--line);
  background:transparent;color:var(--muted);font-family:inherit;font-size:14px;
  cursor:pointer;transition:all .2s;letter-spacing:.04em;
  -webkit-tap-highlight-color:transparent;
}
.toggle-btn.active{
  background:rgba(241,217,155,.12);color:var(--gold2);
  border-color:rgba(241,217,155,.5);
}

/* 生成ボタン */
.gen-btn{
  width:100%;padding:18px;border-radius:14px;border:none;
  background:linear-gradient(90deg,var(--gold2),var(--gold));
  color:#1a0e2e;font-size:18px;font-weight:700;font-family:inherit;
  cursor:pointer;letter-spacing:.1em;transition:transform .2s,box-shadow .2s;
  box-shadow:0 8px 24px rgba(200,150,60,.3);
  -webkit-tap-highlight-color:transparent;
}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(200,150,60,.45)}
.gen-btn:active{transform:scale(.98);box-shadow:0 4px 12px rgba(200,150,60,.3)}

/* ── 出力カード ── */
.output-section{display:none}
.output-section.show{display:block}
.output-label{font-size:12px;letter-spacing:.2em;color:var(--gold);margin:32px 0 14px;text-align:center}

.post-card{
  background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:20px;margin-bottom:14px;backdrop-filter:blur(6px);
}
@media(max-width:480px){.post-card{padding:16px;border-radius:14px}}
.post-card:first-of-type{border-color:rgba(241,217,155,.5);
  box-shadow:0 0 20px rgba(241,217,155,.08)}
.post-num{font-size:11px;letter-spacing:.2em;color:var(--gold);margin-bottom:10px}

textarea{
  width:100%;border:none;background:transparent;
  color:var(--white);font-family:inherit;font-size:15px;line-height:2;
  resize:none;outline:none;min-height:170px;
}
@media(max-width:480px){textarea{font-size:16px;min-height:190px}}

.card-footer{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  margin-top:14px;padding-top:14px;border-top:1px solid var(--line);
}
@media(max-width:480px){
  .card-footer{gap:8px}
  .copy-btn{width:100%;margin-left:0;text-align:center;padding:12px}
}
.char-count{font-size:13px;letter-spacing:.06em}
.char-ok{color:var(--green)}
.char-over{color:var(--red)}
.forbidden-badge{
  font-size:12px;padding:3px 12px;border-radius:999px;
  border:1px solid;
}
.badge-ok{background:rgba(122,189,168,.1);color:var(--green);border-color:rgba(122,189,168,.4)}
.badge-ng{background:rgba(255,144,144,.1);color:var(--red);border-color:rgba(255,144,144,.4)}
.copy-btn{
  margin-left:auto;padding:10px 22px;border-radius:999px;border:1px solid var(--line);
  background:transparent;color:var(--gold2);font-family:inherit;font-size:14px;
  cursor:pointer;transition:background .2s;letter-spacing:.06em;
  -webkit-tap-highlight-color:transparent;
}
.copy-btn:hover{background:rgba(241,217,155,.12)}
.copy-btn:active{background:rgba(241,217,155,.2)}
.copy-btn.done{background:rgba(122,189,168,.15);color:var(--green);border-color:rgba(122,189,168,.4)}

/* 注記 */
.note{font-size:12px;color:rgba(255,255,255,.35);text-align:center;
  margin-top:12px;line-height:1.9;letter-spacing:.04em}
</style>
</head>
<body>
<div class="stars" aria-hidden="true"></div>
<div class="wrap">

<div class="header">
  <p class="kicker">SNS Post Generator</p>
  <h1>🌙 SNS投稿ジェネレーター</h1>
  <p class="today" id="today-display"></p>
</div>

<!-- 設定パネル -->
<div class="panel">
  <div class="field">
    <label>✦ 今日の宿</label>
    <select id="sel-shuku">
      <option value="">選んでください</option>
      <option>角宿</option><option>亢宿</option><option>氐宿</option>
      <option>房宿</option><option>心宿</option><option>尾宿</option>
      <option>箕宿</option><option>斗宿</option><option>女宿</option>
      <option>虚宿</option><option>危宿</option><option>室宿</option>
      <option>壁宿</option><option>奎宿</option><option>婁宿</option>
      <option>胃宿</option><option>昴宿</option><option>畢宿</option>
      <option>觜宿</option><option>参宿</option><option>井宿</option>
      <option>鬼宿</option><option>柳宿</option><option>星宿</option>
      <option>張宿</option><option>翼宿</option><option>軫宿</option>
    </select>
  </div>
  <div class="field">
    <label>✦ 投稿先</label>
    <div class="toggle-wrap">
      <button class="toggle-btn active" onclick="setPlat('X',this)">X（Twitter）140字</button>
      <button class="toggle-btn" onclick="setPlat('IG',this)">Instagram 制限なし</button>
    </div>
  </div>
</div>

<button class="gen-btn" onclick="generate()">✨ 投稿文を生成する</button>

<!-- 出力 -->
<div class="output-section" id="output">
  <p class="output-label">✦ 生成された投稿文 ✦</p>
  <div id="cards"></div>
  <p class="note">テキストは直接編集できます。編集すると文字数・禁止語が再チェックされます。</p>
</div>

</div>

<script>
// ── 今日の日付 ──
(function(){
  const d = new Date();
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('today-display').textContent =
    d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+days[d.getDay()]+'）';
})();

// ── プラットフォーム ──
let platform = 'X';
function setPlat(p, btn){
  platform = p;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('textarea').forEach(ta=>updateCard(ta));
}

// ── 27宿データ ──
const DATA = {
  '角宿':{ energy:'新しい始まりのエネルギーが高まる日です。', actions:['花瓶の水を替えながら、今月始めたいことを声に出してみてください','今日だけでいい。一つだけ「やってみたいこと」を決めてみてください','朝の空気を深く吸って、今の自分に「始めていいよ」と言ってみてください'] },
  '亢宿':{ energy:'自分の軸を静かに確かめられる日です。', actions:['今日ぶれずに守りたいことを、一つだけ決めてみてください','引き出しを一つ整理しながら、心の中も一緒に整えてみてください','ノートに「今の自分の大切なもの」を三つ書いてみてください'] },
  '氐宿':{ energy:'ご縁と魅力が自然に引き寄せられる日です。', actions:['玄関を丁寧に整えて「良いご縁を迎えます」と心の中で唱えてみてください','大切な人へ、一言だけ感謝を伝えてみてください','お気に入りのものを一つ、手に取ってゆっくり眺めてみてください'] },
  '房宿':{ energy:'愛と豊かさを安心して受け取れる、温かな日です。', actions:['今日は誰かの好意を素直に「ありがとう」と受け取ってみてください','お気に入りのカップでゆっくりお茶を一杯、自分のために淹れてみてください','鍵を手に取りながら「大切なものが守られている」と感じてみてください'] },
  '心宿':{ energy:'本音の力が静かに湧き上がる日です。', actions:['今日感じたことを、日記に一言だけ書いてみてください','キャンドルや灯りをゆっくり眺めながら、本音を一つ確かめてみてください','好きな音楽を一曲だけ、目を閉じて聴いてみてください'] },
  '尾宿':{ energy:'情熱を行動に変える、勢いのある日です。', actions:['今日やろうと思っていたことを、まず5分だけ始めてみてください','バッグの中を整理して、今日の目的をひとつ決めてみてください','「やってみたい」と思ったことを、誰かに話してみてください'] },
  '箕宿':{ energy:'必要なものを見極める、豊かな日です。', actions:['今日は「これは本当に必要か」を一つだけ問いかけてみてください','かごや引き出しを整えながら、残すものを丁寧に選んでみてください','今月受け取った豊かさを、一つ思い出してみてください'] },
  '斗宿':{ energy:'未来の方向を定める、誠実な日です。', actions:['今日の小さな選択を、丁寧に行ってみてください','手帳を開いて、大切な予定に静かに感謝を向けてみてください','「今の自分はどこへ向かっているか」を静かに感じてみてください'] },
  '女宿':{ energy:'繊細な感性が花開く、丁寧な日です。', actions:['好きなものに触れる時間を、今日一つだけ作ってみてください','お部屋の小さな美しさを一つ見つけてみてください','自分のために丁寧な時間を、今日ひとつ意識して作ってみてください'] },
  '虚宿':{ energy:'静かな余白の中に本質が見えてくる日です。', actions:['何もしない時間を一分だけ、意識して作ってみてください','空のノートを開いて、ただ静かに座ってみてください','深呼吸を三回して、今感じていることをそのまま感じてみてください'] },
  '危宿':{ energy:'細部まで見通し、安全な道を選べる日です。', actions:['今日の備えを一つ確認してみてください','傘や荷物を整えながら「備えがあるから進める」と感じてみてください','一歩進む前に、丁寧に確認する時間を取ってみてください'] },
  '室宿':{ energy:'心地よい居場所が育まれる、安心の日です。', actions:['玄関を丁寧に整えて「ここが私の土台」と感謝してみてください','今日「ここにいていい」と感じる瞬間を一つ探してみてください','お気に入りの場所で、ゆっくり深呼吸してみてください'] },
  '壁宿':{ energy:'大切なものを守る、知恵と強さの日です。', actions:['今日大切にしたいものを一つ、心の中で確かめてみてください','本棚を整えながら、守りたいものを丁寧に扱ってみてください','自分を守るために「今日断っていいこと」を一つ決めてみてください'] },
  '奎宿':{ energy:'学びが深まり、知恵が輝く日です。', actions:['今日学んだことを、一文だけノートに書いてみてください','「誰かに伝えたい知恵」を一つ思い浮かべてみてください','本や記事を一ページだけ、丁寧に読んでみてください'] },
  '婁宿':{ energy:'情熱が形になる、実りの日です。', actions:['今日の努力を一つ、自分でちゃんと認めてみてください','散らばっていることをひとつにまとめて、最初の一歩を踏み出してみてください','好きな花を飾りながら、今月の小さな成果を思い出してみてください'] },
  '胃宿':{ energy:'今ある豊かさを味わう、感謝の日です。', actions:['今日すでにあるものに「ありがとう」を一つ伝えてみてください','小物入れを整理しながら「大切にしてくれてありがとう」と感じてみてください','今日の食事を一口だけ、ゆっくり味わって食べてみてください'] },
  '昴宿':{ energy:'澄んだ心で未来を映す、輝きの日です。', actions:['鏡をゆっくり磨きながら「今日の私の光に感謝します」と心の中で唱えてみてください','朝の光の中で、今日どんな自分でいたいかを一つ決めてみてください','今日一つだけ、美しいと感じるものをゆっくり眺めてみてください'] },
  '畢宿':{ energy:'深く理解し、自分の軸を信頼できる日です。', actions:['青いものを見つめながら、今日ひとつ深く理解したいことを決めてみてください','焦らず、今日は一つのことをじっくり丁寧にやってみてください','「今の自分でいい」と、一度だけ自分に言ってみてください'] },
  '觜宿':{ energy:'言葉が力を持つ、表現の日です。', actions:['今日伝えたいことを、一文で言語化してみてください','カーテンを開けながら、今日の気持ちを一言声に出してみてください','大切な人へ、短い言葉で気持ちを伝えてみてください'] },
  '参宿':{ energy:'迷いを手放し、一歩踏み出せる日です。', actions:['靴を履く時に「今日の小さな挑戦」をひとつ決めてみてください','迷っていることがあれば、まず5分だけ動いてみてください','「やってみよう」を今日一つだけ行動に移してみてください'] },
  '井宿':{ energy:'知恵と潤いが満ちる、豊かな流れの日です。', actions:['水を一杯、ゆっくり飲みながら「流れに乗っていい」と感じてみてください','今日の豊かさを受け取るために、心を少し開いてみてください','必要な知恵がやってくると信じて、今日の出会いを丁寧に受け取ってみてください'] },
  '鬼宿':{ energy:'不要なものを手放す、浄化の日です。', actions:['「もう手放していいもの」を心の中で一つ手放してみてください','白いハンカチを整えながら、心の中の絡まりをほどいてみてください','引き出しを一つ整理して、スッキリした感覚を味わってみてください'] },
  '柳宿':{ energy:'感情の流れが整い、やさしさが広がる日です。', actions:['髪をとかす時に、頭の中の絡まりも一緒にほどけるとイメージしてみてください','今日誰かにやさしい言葉をかけてみてください','深呼吸して、感情をそのまま感じることを許してみてください'] },
  '星宿':{ energy:'自分の光が輝く、表現と直感の日です。', actions:['「いいな」と感じたことを、そのまま誰かに伝えてみてください','好きなことを一つ、思いきり楽しんでみてください','ライトを点ける時に「私の光もこの部屋に広がる」と感じてみてください'] },
  '張宿':{ energy:'温かなエネルギーで場が満たされる、広がりの日です。', actions:['今日誰かの役に立てる小さな親切を一つ決めてみてください','温かい飲み物を、誰かのために一杯淹れてみてください','今日の温かさを誰かと分かち合ってみてください'] },
  '翼宿':{ energy:'自由に羽ばたく、可能性が広がる日です。', actions:['羽織るものを身につけながら、自分の可能性を感じてみてください','「どこへでも行ける」と一度だけ感じてみてください','今日の可能性を一つ、声に出してみてください'] },
  '軫宿':{ energy:'ご縁が深まる、つながりの日です。', actions:['今日大切にしたい人や予定に、感謝を向けてみてください','大切な人に一言、連絡してみてください','カレンダーを見ながら「このご縁に感謝します」と心の中で唱えてみてください'] },
};

const HASHTAGS = '#月読みワンダーランド #月の整え #宿曜';
const FORBIDDEN = /危険|最悪|不幸|祟り|呪い|取り返しのつかない|絶対.*すべき|必ず.*しなければ|今すぐ|残り.*席|限定.*名|乗り遅れ|損をする|急いで|霊|憑き|除霊|修行/g;

function countChars(str){
  return [...str].reduce((n,c)=>{
    const cp = c.codePointAt(0);
    return n + (cp > 0xFFFF || /\p{Emoji_Presentation}/u.test(c) ? 2 : 1);
  }, 0);
}

function checkForbidden(text){
  const hits = text.match(FORBIDDEN)||[];
  return {pass: hits.length===0, hits};
}

function buildPost(shuku, action){
  return `今日は「${shuku}」の日🌙\n\n${DATA[shuku].energy}\n\nこんな日は\n${action}\n\n月の流れに合わせて整えると、\n不思議と毎日が少しずつ変わってきます。\n\n${HASHTAGS}`;
}

function updateCard(ta){
  const card = ta.closest('.post-card');
  const text = ta.value;
  const len = countChars(text);
  const limit = platform === 'X' ? 140 : 9999;
  const fc = checkForbidden(text);

  const cc = card.querySelector('.char-count');
  if(platform === 'X'){
    cc.textContent = len+'字 / 140字';
    cc.className = 'char-count '+(len<=140?'char-ok':'char-over');
  } else {
    cc.textContent = len+'字';
    cc.className = 'char-count char-ok';
  }

  const fb = card.querySelector('.forbidden-badge');
  if(fc.pass){
    fb.textContent='禁止語 0件 ✅';
    fb.className='forbidden-badge badge-ok';
  } else {
    fb.textContent='禁止語検出 ⚠️ '+fc.hits.join('・');
    fb.className='forbidden-badge badge-ng';
  }
}

function generate(){
  const shuku = document.getElementById('sel-shuku').value;
  if(!shuku){alert('今日の宿を選んでください🌙');return;}
  const data = DATA[shuku];
  if(!data){alert('データがありません');return;}

  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML='';

  data.actions.forEach((action, i)=>{
    const text = buildPost(shuku, action);
    const len = countChars(text);
    const fc = checkForbidden(text);
    const isFirst = i===0;

    const card = document.createElement('div');
    card.className='post-card';
    card.innerHTML=`
      <div class="post-num">案 ${i+1}${isFirst?' ← おすすめ':''}</div>
      <textarea oninput="updateCard(this)">${text}</textarea>
      <div class="card-footer">
        <span class="char-count ${platform==='X'?(len<=140?'char-ok':'char-over'):'char-ok'}">
          ${platform==='X'?len+'字 / 140字':len+'字'}
        </span>
        <span class="forbidden-badge ${fc.pass?'badge-ok':'badge-ng'}">
          ${fc.pass?'禁止語 0件 ✅':'禁止語検出 ⚠️ '+fc.hits.join('・')}
        </span>
        <button class="copy-btn" onclick="copyPost(this)">コピー</button>
      </div>`;
    cardsEl.appendChild(card);
  });

  document.getElementById('output').classList.add('show');
  document.getElementById('output').scrollIntoView({behavior:'smooth',block:'start'});
}

function copyPost(btn){
  const ta = btn.closest('.post-card').querySelector('textarea');
  navigator.clipboard.writeText(ta.value).then(()=>{
    btn.textContent='コピーしました！';
    btn.classList.add('done');
    setTimeout(()=>{btn.textContent='コピー';btn.classList.remove('done')},2000);
  });
}
</script>
</body>
</html>
