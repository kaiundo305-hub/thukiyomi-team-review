<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>月読みワンダーランド 月の種｜開運パスポート第1の鑑定書</title>
<style>
  :root{
    --bg1:#1b1233; --bg2:#3a235f; --gold:#d8b56d; --gold2:#f1d99b;
    --white:#fffaf2; --muted:#e5d9ef; --card:rgba(255,255,255,.10);
    --line:rgba(241,217,155,.45);
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
    color:var(--white); background:
      radial-gradient(circle at 18% 8%, rgba(132,93,176,.55) 0, transparent 24%),
      radial-gradient(circle at 82% 18%, rgba(241,217,155,.16) 0, transparent 22%),
      radial-gradient(circle at 50% 92%, rgba(100,160,220,.14) 0, transparent 28%),
      linear-gradient(145deg,var(--bg1),var(--bg2));
    min-height:100vh; line-height:1.8;
  }
  .stars:before{content:""; position:fixed; inset:0; pointer-events:none; opacity:.34; background-image:
    radial-gradient(circle at 7% 16%, rgba(255,255,255,.9) 0 1px, transparent 1.5px),
    radial-gradient(circle at 22% 72%, rgba(241,217,155,.9) 0 1px, transparent 1.5px),
    radial-gradient(circle at 41% 28%, rgba(255,255,255,.8) 0 1px, transparent 1.5px),
    radial-gradient(circle at 63% 84%, rgba(255,255,255,.75) 0 1px, transparent 1.5px),
    radial-gradient(circle at 79% 35%, rgba(241,217,155,.75) 0 1px, transparent 1.5px),
    radial-gradient(circle at 94% 66%, rgba(255,255,255,.85) 0 1px, transparent 1.5px);
    background-size:211px 197px,263px 241px,307px 283px,233px 251px,281px 223px,337px 299px;}
  .stars:after{content:""; position:fixed; inset:0; pointer-events:none; opacity:.18; background:
    radial-gradient(circle at 50% 30%, transparent 0 18%, rgba(241,217,155,.22) 18.5%, transparent 19.2%),
    radial-gradient(circle at 50% 30%, transparent 0 28%, rgba(241,217,155,.12) 28.5%, transparent 29.1%);
  }
  .wrap{max-width:860px; margin:auto; padding:28px 18px 60px; position:relative;}
  .hero,.card{border:1px solid var(--line); background:
    linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.055)),
    radial-gradient(circle at 50% 0%, rgba(241,217,155,.12), transparent 42%);
    border-radius:28px; padding:30px; box-shadow:0 18px 60px rgba(0,0,0,.25), inset 0 0 34px rgba(241,217,155,.06); backdrop-filter: blur(8px); position:relative; overflow:hidden;}
  .hero:before,.card:before{content:"";position:absolute;inset:12px;border:1px solid rgba(241,217,155,.22);border-radius:22px;pointer-events:none}
  .hero:after,.card:after{content:"✦";position:absolute;top:14px;right:20px;color:rgba(241,217,155,.58);font-size:18px;letter-spacing:0;text-shadow:0 0 12px rgba(241,217,155,.45);pointer-events:none}
  .hero{text-align:center; margin-top:18px;}
  .moon{width:82px;height:82px;border-radius:50%; margin:0 auto 12px; background:radial-gradient(circle at 30% 30%,#fff7d7,#d7b66d 64%,#9c7b3e); box-shadow:0 0 35px rgba(241,217,155,.55)}
  h1{font-size:clamp(28px,6vw,46px); letter-spacing:.06em; margin:0; color:var(--gold2)}
  h2{font-size:26px;color:var(--gold2); margin:0 0 14px;}
  h3{font-size:21px;color:var(--gold2); margin:24px 0 8px;}
  .sub{font-size:17px; color:var(--muted); margin:10px 0 22px;}
  .btn{appearance:none; border:0; cursor:pointer; border-radius:999px; padding:14px 26px; font-size:17px; font-family:inherit; color:#271733; background:linear-gradient(90deg,var(--gold2),var(--gold)); box-shadow:0 8px 24px rgba(0,0,0,.22); margin:8px 6px;}
  .btn.secondary{background:transparent; color:var(--gold2); border:1px solid var(--line);}
  .hidden{display:none!important}
  .card{margin-top:20px;}
  label{display:block; margin:10px 0 6px; color:var(--gold2);}
  input,select,textarea{width:100%; padding:13px 14px; border-radius:14px; border:1px solid var(--line); background:rgba(255,255,255,.10); color:var(--white); font-size:16px;font-family:inherit;}
  textarea{min-height:96px;resize:vertical;line-height:1.75}
  option{color:#222;}
  .question{padding:18px 0; border-top:1px solid rgba(255,255,255,.12)}
  .qtitle{font-size:18px; color:var(--gold2); margin-bottom:10px;}
  .choice{display:block; padding:12px 14px; border:1px solid rgba(241,217,155,.32); border-radius:16px; margin:9px 0; background:rgba(255,255,255,.07); cursor:pointer;}
  .choice input{width:auto; margin-right:8px;}
	  .result-title{font-size:30px; color:var(--gold2); text-align:center; line-height:1.45;text-shadow:0 0 18px rgba(241,217,155,.22);}
	  .title-kage{display:block;font-size:.62em;letter-spacing:.26em;color:rgba(241,217,155,.88);margin-bottom:5px;font-weight:600}
	  .title-seed{display:block;font-size:1.06em;letter-spacing:.08em;font-weight:800;color:#ffe6a8;text-shadow:0 0 22px rgba(241,217,155,.32)}
	  .title-passport{display:block;font-size:.66em;letter-spacing:.16em;margin-top:8px;color:rgba(255,250,242,.92);font-weight:600}
		  .passport-cover-page{margin:0 auto 24px;text-align:center;position:relative;width:min(100%,680px)}
		  .cover-image{display:block;width:100%;height:auto;margin:20px auto 24px;border-radius:18px;border:1px solid rgba(241,217,155,.42);box-shadow:0 26px 70px rgba(0,0,0,.34)}
			  .cover-name{
			    position:absolute;
			    left:13.8%;
			    top:31.8%;
			    width:39%;
			    text-align:center;
			    color:#5f3f12;
			    font-size:clamp(18px,2.6vw,28px);
			    line-height:1.2;
			    letter-spacing:.06em;
			    font-weight:700;
			    text-shadow:0 1px 0 rgba(255,248,221,.65);
			    pointer-events:none;
			    white-space:nowrap;
			    overflow:hidden;
			  }
			  .cover-name-medium{font-size:clamp(16px,2.2vw,24px);letter-spacing:.04em}
			  .cover-name-long{font-size:clamp(13px,1.75vw,19px);letter-spacing:.02em}
	  .badge{display:inline-block; border:1px solid var(--line); border-radius:999px; padding:4px 14px; color:var(--gold2); margin:4px; font-size:14px;}
  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:14px;}
  .mini{background:rgba(255,255,255,.07); border:1px solid rgba(241,217,155,.26); border-radius:18px; padding:16px; display:flex; flex-direction:column;}
  .mini h3{margin:0 0 10px; min-height:2.8em; display:flex; align-items:flex-start; font-size:18px;}
  .mini p{flex:1; margin:0; line-height:1.85;}
  .note{font-size:14px;color:#e8def2; opacity:.9;}
  a{color:var(--gold2)}
  .balance-row{display:flex;align-items:center;gap:8px;margin:5px 0}
  .balance-label{min-width:68px;font-size:13px;color:var(--gold2)}
  .balance-bar{flex:1;height:8px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden}
  .balance-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:4px}
  .balance-num{font-size:12px;color:var(--muted);min-width:36px;text-align:right}
  .harmony-card{padding:16px;border-radius:16px;margin:12px 0}
  .harmony-perfect{background:rgba(241,217,155,.16);border:1px solid rgba(241,217,155,.55)}
  .harmony-bridge{background:rgba(180,120,255,.11);border:1px solid rgba(180,120,255,.42)}
  .harmony-transform{background:rgba(100,160,220,.11);border:1px solid rgba(100,160,220,.42)}
  .level-badge{display:inline-block;padding:3px 12px;border-radius:999px;font-size:12px;margin-bottom:8px}
  .lv-perfect{background:rgba(241,217,155,.32);color:var(--gold2)}
  .lv-bridge{background:rgba(180,120,255,.24);color:#d4a0ff}
  .lv-transform{background:rgba(100,160,220,.24);color:#a0c8f0}
  .second-copy{font-size:14px;color:var(--muted);margin-top:6px;line-height:1.6}
  .basis-card{margin:16px 0;padding:16px 18px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(241,217,155,.28)}
  .basis-label{font-size:11px;letter-spacing:.2em;color:var(--gold2);margin:0 0 10px;opacity:.8}
  .basis-chain{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:12px;font-size:13px}
  .basis-step{background:rgba(241,217,155,.14);border:1px solid rgba(241,217,155,.3);border-radius:8px;padding:4px 10px;color:var(--gold2)}
  .basis-arrow{color:var(--gold2);opacity:.6;font-size:12px}
  .basis-reason{font-size:14px;color:var(--muted);line-height:1.8;margin:0;border-left:2px solid rgba(241,217,155,.4);padding-left:12px}
  .neko-card{margin:24px 0 8px;border-radius:22px;overflow:hidden;background:linear-gradient(160deg,#fff9e8,#fef3cc);border:2px solid rgba(241,210,80,.45);box-shadow:0 8px 28px rgba(180,150,60,.18)}
  .neko-bar{background:linear-gradient(90deg,rgba(241,200,70,.38),rgba(241,217,140,.22));padding:9px 18px;font-size:12px;letter-spacing:.2em;color:#c8960a}
  .neko-inner{display:grid;grid-template-columns:104px 1fr;gap:16px;padding:16px 18px;align-items:center}
  .neko-avatar{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-width:0}
  .neko-photo{width:88px;max-width:100%;border-radius:14px;object-fit:cover;display:block;margin:0 auto}
  .neko-name-tag{font-size:10px;color:#8a6200;text-align:center;line-height:1.5;white-space:nowrap}
  .neko-bubble{background:rgba(255,255,255,.68);border-radius:16px;padding:14px 16px;font-size:14px;line-height:2;color:#3a2800;white-space:pre-line;border:1px solid rgba(241,210,80,.32)}
  .neko-promise{margin-top:12px;padding:12px 14px;border-radius:14px;background:rgba(255,246,210,.74);border:1px solid rgba(200,150,10,.26);color:#5d3b00;font-weight:bold;line-height:1.9}
  .neko-phrase{margin-top:12px;padding-top:10px;border-top:1px solid rgba(200,150,10,.24);font-size:13px;color:#8a6200;font-weight:bold;letter-spacing:.06em}
  @media(max-width:520px){.neko-inner{grid-template-columns:1fr;justify-items:center;text-align:left}.neko-bubble{width:100%;box-sizing:border-box}.neko-photo{width:82px}}
  @media(max-width:520px){
    .card{padding:18px 14px}
    .card:before{display:none}
    #resultBody{border-left:none!important;border-right:none!important;padding-left:4px!important;padding-right:4px!important}
  }
  .challenge-intro{font-size:14px;color:var(--muted);line-height:1.8;margin:6px 0 14px}
  .challenge-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(196px,1fr));gap:10px}
  .day-card{background:rgba(255,255,255,.06);border:1px solid rgba(241,217,155,.2);border-radius:16px;padding:14px;position:relative}
  .day-card.today{background:rgba(241,217,155,.13);border-color:rgba(241,217,155,.52);box-shadow:0 0 18px rgba(241,217,155,.18)}
  .day-today-badge{display:inline-block;background:rgba(241,217,155,.28);color:var(--gold2);font-size:10px;padding:2px 9px;border-radius:999px;margin-bottom:6px;letter-spacing:.08em}
  .day-num{font-size:11px;color:var(--gold2);letter-spacing:.18em;margin-bottom:4px;opacity:.8}
  .day-title{font-size:14px;color:var(--gold2);font-weight:bold;margin-bottom:6px;line-height:1.4}
  .day-action{font-size:13px;color:var(--muted);line-height:1.75}
  .copy-btn{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--gold2);border-radius:999px;padding:10px 22px;font-size:14px;font-family:inherit;cursor:pointer;margin-top:14px;letter-spacing:.06em}
  .copy-btn:hover{background:rgba(241,217,155,.15)}
  .second-report-preview{margin:24px 0 16px;padding:22px 24px;border-radius:20px;background:linear-gradient(160deg,rgba(255,250,242,.12),rgba(241,217,155,.08));border:1px solid rgba(241,217,155,.38);box-shadow:inset 0 0 28px rgba(241,217,155,.06)}
  .second-report-preview-label{font-size:11px;letter-spacing:.24em;color:var(--gold2);margin:0 0 10px;text-align:center;opacity:.86}
  .second-report-preview-title{font-size:20px;color:var(--gold2);font-weight:bold;text-align:center;line-height:1.65;margin:0 0 14px}
  .second-report-preview-body{font-size:14px;color:var(--muted);line-height:2;margin:0 0 16px}
  .second-report-pages{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:14px}
  .second-report-page{border:1px solid rgba(241,217,155,.28);border-radius:14px;padding:14px;background:rgba(255,255,255,.06)}
  .second-report-page strong{display:block;color:var(--gold2);font-size:13px;margin-bottom:6px}
  .second-report-page span{display:block;color:var(--muted);font-size:12px;line-height:1.75}
  .live-card{background:rgba(220,80,80,.10);border-color:rgba(220,80,80,.42)!important;box-shadow:0 0 16px rgba(220,80,80,.14)!important}
  .live-badge{display:inline-block;background:rgba(220,60,60,.85);color:#fff;font-size:10px;font-weight:bold;padding:2px 9px;border-radius:999px;margin-bottom:6px;letter-spacing:.12em}
  .cta-block{margin:28px 0;border-radius:24px;overflow:hidden;background:linear-gradient(160deg,rgba(241,217,155,.12),rgba(180,120,255,.1));border:1px solid rgba(241,217,155,.4);padding:26px 22px;text-align:center}
  .cta-eyebrow{font-size:12px;letter-spacing:.22em;color:var(--gold2);margin:0 0 8px;opacity:.8}
  .cta-title{font-size:22px;color:var(--gold2);font-weight:bold;margin:0 0 10px;letter-spacing:.08em}
  .cta-desc{font-size:14px;color:var(--muted);line-height:1.9;margin:0 0 18px}
  .live-schedule{display:flex;justify-content:center;gap:12px;margin:0 0 20px;flex-wrap:wrap}
  .ls-item{background:rgba(255,255,255,.08);border:1px solid rgba(220,60,60,.35);border-radius:14px;padding:10px 18px;min-width:100px}
  .ls-day{font-size:16px;font-weight:bold;color:#f08080;margin-bottom:3px}
  .ls-label{font-size:12px;color:var(--muted)}
  .cta-join-btn{display:inline-block;background:linear-gradient(90deg,var(--gold2),var(--gold));color:#271733;border-radius:999px;padding:14px 30px;font-size:16px;font-weight:bold;font-family:inherit;text-decoration:none;letter-spacing:.06em;box-shadow:0 8px 24px rgba(0,0,0,.22);cursor:pointer}
  .cta-note{font-size:12px;color:var(--muted);margin:14px 0 0;opacity:.75}
  [contenteditable]{outline:none;border-radius:6px;cursor:text;transition:background .15s}
  [contenteditable]:hover{background:rgba(241,217,155,.10);outline:1px dashed rgba(241,217,155,.4)}
  [contenteditable]:focus{background:rgba(241,217,155,.15);outline:1px solid rgba(241,217,155,.6)}
  /* 参加者ビュー：編集不可 */
  body.participant-readonly [contenteditable]{pointer-events:none!important;cursor:default!important;user-select:text!important}
  body.participant-readonly [contenteditable]:hover,body.participant-readonly [contenteditable]:focus{background:none!important;outline:none!important}
  body.participant-readonly .edit-hint{display:none!important}
  .edit-hint{font-size:10px;color:var(--muted);text-align:right;opacity:.55;margin:4px 2px 0;letter-spacing:.06em}
  .memo-block{margin:22px 0;padding:16px 18px;border-radius:16px;border:1px dashed rgba(241,217,155,.42);background:rgba(241,217,155,.06)}
  .memo-label{font-size:11px;color:var(--gold2);letter-spacing:.14em;margin-bottom:8px}
  .memo-body{min-height:56px;font-size:14px;color:var(--muted);line-height:1.9;padding:4px 2px}
  .memo-body[data-kanon-message="true"]{color:var(--white)!important;font-size:15px!important;line-height:2.0!important}
  .memo-body:empty:before{content:attr(data-ph);opacity:.4;pointer-events:none;display:block}
  .print-note-box{margin:26px 0 0;padding:18px 20px;border:1px solid rgba(241,217,155,.34);border-radius:16px;background:rgba(255,250,242,.05)}
  .print-note-title{font-size:12px;color:var(--gold2);letter-spacing:.18em;margin:0 0 12px;text-align:center}
  .print-note-lines{min-height:96px;background:repeating-linear-gradient(to bottom,transparent 0,transparent 29px,rgba(241,217,155,.22) 30px);border-radius:8px}
  .print-note-caption{font-size:12px;color:var(--muted);text-align:center;margin:12px 0 0;line-height:1.8}
  .print-frame,.print-footer{display:none}
  #resultBody{border-left:1px solid rgba(241,217,155,.34);border-right:1px solid rgba(241,217,155,.34);padding-left:22px;padding-right:22px}
  @media print{
    [contenteditable]:hover,[contenteditable]:focus{background:none!important;outline:none!important}
    .edit-hint{display:none!important}
    .memo-block{border:1px solid rgba(201,163,74,.4)!important;background:rgba(201,163,74,.04)!important}
    .memo-body:empty{display:none}
  }
  .lottery-notice{margin:24px 0 8px;padding:18px 22px;border-radius:18px;border:1px solid rgba(241,217,155,.48);background:rgba(241,217,155,.10);text-align:center}
  .lottery-notice p{margin:5px 0;line-height:1.8}
  .lottery-title{font-size:16px;color:var(--gold2);font-weight:bold;letter-spacing:.08em;margin-bottom:8px!important}
@media print{
  /* ── 固定枠は使わない（iOS対応のため） ── */
  .print-frame,.print-footer{
    display:none!important;
  }
  .print-frame::before,.print-frame::after{
    display:none!important;
  }
  /* ── 基本設定 ── */
  html{background:#fff6dc!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:#fff6dc!important;color:#1a1410!important;font-size:10.5pt!important;line-height:1.58!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .stars:before,.stars:after{display:none!important}
  /* ── 非表示 ── */
  .btn,.copy-btn,.cta-join-btn,.edit-hint{display:none!important}
  .lottery-notice{display:none!important}
  .live-badge,.day-today-badge{display:none!important}
  /* ── カード背景 ── */
  .hero,.card,.wrap{background:none!important;border:none!important;box-shadow:none!important;backdrop-filter:none!important}
  .wrap::after,.wrap::before,.hero::before,.hero::after,.card::before,.card::after{display:none!important}
  #result.card{margin:0!important;padding:0!important}
  #resultBody{
    border-left:0.9pt solid #b89438!important;
    border-right:0.9pt solid #b89438!important;
    padding-left:9mm!important;
    padding-right:9mm!important;
    padding-top:0!important;
    color:#1a1410!important;
    background:#fffdf6!important;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  #resultBody p,
  #resultBody li,
  #resultBody strong,
  #resultBody [contenteditable="true"],
  #resultBody .basis-reason,
  #resultBody .day-action,
  #resultBody .challenge-intro,
  #resultBody .cta-desc,
  #resultBody .cta-note,
  #resultBody .memo-body{
    color:#1a1410!important;
  }
  #resultBody h3,
  #resultBody .basis-label,
  #resultBody .memo-label{
    color:#7a5010!important;
  }
  #resultBody::before{
    content:'✦';
    display:flex;
    align-items:center;
    justify-content:center;
    height:8.5mm;
    margin:0 -9mm 8mm;
    color:#9b772b;
    font-size:8pt;
    letter-spacing:.18em;
    border-top:1.35pt solid #b89438;
    border-bottom:0.45pt solid #d7c188;
    background:
      linear-gradient(90deg,transparent 0 4mm,rgba(184,148,56,.38) 4mm,rgba(184,148,56,.38) calc(50% - 8mm),transparent calc(50% - 8mm),transparent calc(50% + 8mm),rgba(184,148,56,.38) calc(50% + 8mm),rgba(184,148,56,.38) calc(100% - 4mm),transparent calc(100% - 4mm)),
      linear-gradient(90deg,transparent 0 8mm,rgba(215,193,136,.28) 8mm,rgba(215,193,136,.28) calc(100% - 8mm),transparent calc(100% - 8mm));
    background-size:100% 1px,100% 1px;
    background-position:center 39%,center 61%;
    background-repeat:no-repeat;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  #resultBody .passport-cover-page{
    display:flex!important;
    align-items:center!important;
    justify-content:center!important;
    min-height:255mm!important;
    break-after:page!important;
    page-break-after:always!important;
    margin:0!important;
    padding:0!important;
  }
  #resultBody .report-page-start{
    break-before:auto!important;
    page-break-before:auto!important;
    padding-top:9mm!important;
  }
  #resultBody .report-page-start::before{
    content:'✦ ✧ ✦　　☽　月読みワンダーランド 月の種｜開運パスポート　☾　　✦ ✧ ✦';
    display:flex;
    align-items:center;
    justify-content:center;
    height:12mm;
    margin:0 -9mm 10mm;
    font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
    font-size:7.5pt;
    letter-spacing:.22em;
    color:#7a4a10;
    border-top:2pt solid #c9a84c;
    border-bottom:1pt solid #d4b86a;
    background:linear-gradient(to right,#fffdf6,#fff8e0 22%,#fff2c0 44%,#ffe898 50%,#fff2c0 56%,#fff8e0 78%,#fffdf6);
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;

function getKanonMessageKey(name,birth,shuku){
 const p=new URLSearchParams(location.search);
 const personKey=p.get('participantId')||p.get('email')||'';
 return ['tsukiyomiMoonSeedKanonMessage',personKey,name||'',birth||'',shuku||''].join('::');
}
function getDiagnosisEditKey(name,birth,shuku){
 const p=new URLSearchParams(location.search);
 const personKey=p.get('participantId')||p.get('email')||'';
 return ['tsukiyomiMoonSeedFullEditV5',personKey,name||'',birth||'',shuku||''].join('::');
}
function shouldClearSavedState(){
 const p=new URLSearchParams(location.search);
 return p.get('clearCache')==='1';
}
function setupKanonMessageAutosave(storageKey){
 const el=document.querySelector('[data-kanon-message]');
 if(!el)return;
 if(shouldClearSavedState()){
  localStorage.removeItem(storageKey);
 }
 const saved=localStorage.getItem(storageKey);
 if(saved!==null && saved.replace(/<br\s*\/?>/gi,'').trim()!==''){
  el.innerHTML=saved;
 } else {
  const pid=new URLSearchParams(location.search).get('participantId')||'';
  if(typeof KANON_PRESET_MESSAGES!=='undefined' && pid && KANON_PRESET_MESSAGES[pid]){
   el.innerHTML=KANON_PRESET_MESSAGES[pid];
   localStorage.setItem(storageKey,KANON_PRESET_MESSAGES[pid]);
  }
 }
 const save=function(){localStorage.setItem(storageKey,el.innerHTML)};
 el.addEventListener('input',save);
 el.addEventListener('blur',save);
}
function setupDiagnosisEditAutosave(storageKey){
 const fields=[...document.querySelectorAll('#resultBody [contenteditable="true"]:not([data-no-autosave]):not([data-kanon-message])')];
 if(!fields.length)return;
 const forceFreshText=shouldClearSavedState();
 try{
   if(forceFreshText){
     localStorage.removeItem(storageKey);
   }
   const saved=forceFreshText?null:JSON.parse(localStorage.getItem(storageKey)||'{}');
   if(saved&&Array.isArray(saved.fields)){
     fields.forEach(function(el,i){
       if(typeof saved.fields[i]==='string'){
         const isEmpty=saved.fields[i].replace(/<br\s*\/?>/gi,'').trim()==='';
         if(!(el.hasAttribute('data-kanon-message')&&isEmpty))el.innerHTML=saved.fields[i];
       }
     });
   }
 }catch(e){}
 const save=function(){
   const payload={
     savedAt:new Date().toISOString(),
     fields:fields.map(function(el){return el.innerHTML;})
   };
   localStorage.setItem(storageKey,JSON.stringify(payload));
 };
 fields.forEach(function(el){
   el.addEventListener('input',save);
   el.addEventListener('blur',save);
 });
 save();
}

function copyChallenge(typeKey,shuku,item){
 const lines=challenges[typeKey].map((d,i)=>{
   const action=d.action.replace('{item}',item);
   return `【Day ${i+1}】${d.title}\n${action}`;
 }).join('\n\n');
 const text=`✦ 7日間チャレンジ（${shuku} × ${types[typeKey].name}）✦\n\n${lines}\n\n— 月読みワンダーランド 月の種｜開運パスポート第1の鑑定書より`;
 if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>alert('コピーしました！SNSやメモ帳に貼り付けてお使いください。'));}
 else{prompt('以下をコピーしてください',text);}
}
function restart(){showSection('top');}
init();

// 参加者ビュー（GitHub Pages + pid/participantId）では編集を無効化
(function(){
  if(location.protocol==='https:'){
    var _p=new URLSearchParams(location.search);
    if(_p.get('pid')||_p.get('participantId')){
      document.body.classList.add('participant-readonly');
    }
  }
})();
// URLパラメータから自動生成（鑑定リストからの呼び出し用）
let urlQ='', urlQ2='';
(function(){
 const p=new URLSearchParams(location.search);
 const name=p.get('name'), birth=p.get('birth');
 if(birth){
   if(name) document.getElementById('name').value=decodeURIComponent(name);
   document.getElementById('birth').value=birth;
   urlQ=p.get('q')?decodeURIComponent(p.get('q')):'';
   urlQ2=p.get('q2')?decodeURIComponent(p.get('q2')):'';
   if(document.getElementById('concernInput')) document.getElementById('concernInput').value=urlQ;
   if(document.getElementById('situationInput')) document.getElementById('situationInput').value=urlQ2;
   autoCalcShuku();
   if(document.getElementById('shuku').value) generateReading();
 }
})();
