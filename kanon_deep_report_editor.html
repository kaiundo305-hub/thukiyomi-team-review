<title>第2の鑑定書 チェック・編集ツール</title>
<style>
  :root{--bg:#0b0e2a;--gold:#d8b56d;--gold2:#f1d99b;--white:#fffaf2;--muted:#c8bcd8;--border:rgba(216,181,109,.3)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--white);font-family:"Hiragino Mincho ProN","Yu Mincho",serif;padding:16px}
  h1{color:var(--gold2);font-size:1.1rem;letter-spacing:.14em;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:6px}
  .subtitle{color:var(--muted);font-size:12px;margin-bottom:16px;letter-spacing:.1em}
  .progress-label{font-size:11px;color:var(--gold2);margin-bottom:6px;letter-spacing:.1em}
  .progress{background:rgba(241,217,155,.1);border-radius:999px;height:8px;margin-bottom:16px;overflow:hidden}
  .progress-bar{background:linear-gradient(90deg,var(--gold),var(--gold2));height:100%;transition:width .3s;border-radius:999px}
  .filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .filter-btn{background:rgba(241,217,155,.1);border:1px solid var(--border);color:var(--gold2);border-radius:999px;padding:4px 12px;font-size:12px;cursor:pointer}
  .filter-btn.active{background:rgba(241,217,155,.25);border-color:var(--gold2)}
  .card{border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;background:rgba(241,217,155,.04);transition:border-color .2s}

  .card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .no{background:rgba(241,217,155,.15);color:var(--gold2);border-radius:6px;padding:2px 8px;font-size:12px;min-width:34px;text-align:center}
  .pname{font-size:15px;font-weight:bold;color:var(--white)}
  .shuku{font-size:12px;color:var(--gold)}
  .concern{font-size:11px;color:var(--muted);background:rgba(255,255,255,.06);border-radius:4px;padding:2px 7px}
  .q-box{background:rgba(255,255,255,.04);border:1px solid rgba(241,217,155,.12);border-radius:8px;padding:8px 10px;margin-bottom:10px;color:rgba(200,188,216,.8);font-size:11px;line-height:1.8;max-height:80px;overflow-y:auto;white-space:pre-wrap}
  .q-label{font-size:10px;color:rgba(241,217,155,.5);letter-spacing:.12em;margin-bottom:3px}
  .key-theme-badge{display:inline-block;background:rgba(241,217,155,.15);border:1px solid rgba(241,217,155,.35);color:var(--gold2);border-radius:4px;padding:2px 8px;font-size:11px;margin-left:6px}
  .section-label{font-size:11px;color:var(--gold2);letter-spacing:.1em;margin-top:10px;margin-bottom:4px}
  .section-hint{font-size:10px;color:rgba(200,188,216,.6);margin-bottom:4px}
  .textarea{width:100%;min-height:88px;background:rgba(255,255,255,.05);border:1px solid rgba(241,217,155,.2);border-radius:8px;color:var(--white);font-family:inherit;font-size:13px;line-height:1.9;padding:10px;resize:vertical;outline:none}

  .textarea.kanon-note{border-color:rgba(160,200,255,.3);background:rgba(80,140,255,.05);min-height:64px}
  .textarea.kanon-note:focus{border-color:rgba(160,200,255,.7)}
  .divider{border:none;border-top:1px dashed rgba(241,217,155,.2);margin:12px 0}
  .btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
  .btn-gen{background:rgba(241,217,155,.15);border:1px solid rgba(241,217,155,.4);color:var(--gold2);border-radius:999px;padding:6px 16px;font-size:12px;font-weight:bold;cursor:pointer;font-family:inherit}

  .btn-save{background:linear-gradient(90deg,var(--gold2),var(--gold));color:#1a0e33;border:none;border-radius:999px;padding:6px 16px;font-size:12px;font-weight:bold;cursor:pointer}
  .btn-copy{background:rgba(80,160,255,.2);border:1px solid rgba(80,160,255,.4);color:#a0c8ff;border-radius:999px;padding:6px 16px;font-size:12px;cursor:pointer;font-family:inherit}
  .btn-copy:hover{background:rgba(80,160,255,.35)}
  .saved-badge{font-size:11px;color:#6ddc9a;letter-spacing:.1em;display:none}

  .btn-all{background:linear-gradient(90deg,var(--gold2),var(--gold));color:#1a0e33;border:none;border-radius:999px;padding:11px 28px;font-size:15px;font-weight:bold;cursor:pointer;display:block;margin:20px auto 6px}
  .btn-export{background:linear-gradient(90deg,#56ab2f,#2d6a1a);color:#fff;border:none;border-radius:999px;padding:11px 28px;font-size:15px;font-weight:bold;cursor:pointer;display:block;margin:6px auto}
  .hint{font-size:11px;color:var(--muted);text-align:center;margin-bottom:20px}
  .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;overflow-y:auto;padding:24px}
  .modal-box{max-width:800px;margin:0 auto;background:#0f1235;border:1px solid rgba(241,217,155,.3);border-radius:16px;padding:24px}
  .modal-box h2{color:#f1d99b;font-size:1rem;margin-bottom:16px}
  .modal-close{background:none;border:1px solid #888;color:#eee;border-radius:8px;padding:6px 14px;cursor:pointer}
  .export-area{width:100%;min-height:320px;background:#000820;border:1px solid rgba(241,217,155,.3);border-radius:8px;color:#a0d8a0;font-family:monospace;font-size:11px;padding:14px;resize:vertical}
  .btn-analyze{background:rgba(100,200,150,.15);border:1px solid rgba(100,200,150,.4);color:#6ddc9a;border-radius:999px;padding:6px 16px;font-size:12px;font-weight:bold;cursor:pointer;font-family:inherit;margin-top:6px}
  .btn-analyze:hover{background:rgba(100,200,150,.28)}
  .gap-panel{margin-top:8px;padding:12px;background:rgba(100,200,150,.05);border:1px solid rgba(100,200,150,.2);border-radius:10px;display:none}
  .kw-hit{display:inline-block;padding:2px 9px;border-radius:4px;margin:2px;font-size:11px;background:rgba(109,220,154,.2);border:1px solid rgba(109,220,154,.45);color:#6ddc9a}
  .kw-miss{display:inline-block;padding:2px 9px;border-radius:4px;margin:2px;font-size:11px;background:rgba(255,100,100,.12);border:1px solid rgba(255,100,100,.3);color:#e8a0a0}
  .gap-score-bar{display:flex;gap:3px;margin:6px 0 4px;align-items:center}
  .gap-pip{display:inline-block;width:18px;height:7px;border-radius:3px}
  .gap-label{font-size:11px;color:rgba(200,188,216,.75);margin-left:6px}
  .gap-themes{font-size:11px;color:rgba(200,188,216,.65);margin-bottom:4px}
  .gap-miss-note{font-size:11px;color:#e8a0a0;margin-bottom:2px}
  .textarea.memo-note{border-color:rgba(100,200,150,.25);background:rgba(50,160,100,.05);min-height:56px}

  .btn-preview{background:rgba(180,130,255,.18);border:1px solid rgba(180,130,255,.45);color:#d4aaff;border-radius:999px;padding:6px 16px;font-size:12px;cursor:pointer;font-family:inherit}

  .preview-report{font-family:"Hiragino Mincho ProN","Yu Mincho",serif}
  .preview-header{text-align:center;padding:16px 0 20px;border-bottom:1px solid rgba(241,217,155,.25);margin-bottom:18px}

  .preview-meta{color:var(--gold2);font-size:12px;letter-spacing:.1em}
  .preview-section{margin-bottom:14px;padding:16px 18px;background:rgba(255,250,242,.06);border:1px solid rgba(241,217,155,.22);border-radius:10px}

  .preview-kanon h3{color:#a0c8ff}
  .preview-empty{color:var(--muted);text-align:center;padding:40px 0;font-size:13px}
  /* ===== ジャンプナビ ===== */
  .jump-nav{position:sticky;top:0;z-index:50;background:rgba(11,14,42,.96);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid rgba(241,217,155,.15);margin:0 -16px 16px;padding:8px 16px 10px}
  .jump-nav-label{font-size:10px;color:rgba(241,217,155,.45);letter-spacing:.13em;margin-bottom:6px}
  .jump-nav-list{display:flex;gap:6px;overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px;scrollbar-width:thin;scrollbar-color:rgba(241,217,155,.2) transparent}

  .jump-nav-list::-webkit-scrollbar-thumb{background:rgba(241,217,155,.25);border-radius:3px}
  .jump-chip{flex-shrink:0;border-radius:6px;padding:4px 11px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;transition:background .15s;border:1px solid rgba(241,217,155,.28);background:rgba(241,217,155,.08);color:var(--gold2)}

  .jump-chip.done{border-color:rgba(100,220,150,.45);color:#6ddc9a;background:rgba(50,180,100,.1)}

<body>
<h1>✦ 第2の鑑定書 チェック・編集ツール</h1>
<p class="subtitle">「自動生成」→ 確認・編集 → 「保存」→ 最後に「JSファイルを書き出す」をお使いください</p>

<div class="progress-label" id="progressLabel">読み込み中...</div>
<div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterCards('all',this)">全員</button>
  <button class="filter-btn" onclick="filterCards('done',this)">✅ 保存済み</button>
  <button class="filter-btn" onclick="filterCards('empty',this)">❌ 未保存</button>
</div>

<!-- スティッキー参加者ナビ -->
<div class="jump-nav" id="jumpNav">
  <div class="jump-nav-label">▸ 参加者にジャンプ</div>
  <div class="jump-nav-list" id="jumpNavList"></div>
</div>

<div id="cards"></div>

<button class="btn-all" onclick="analyzeAll()" style="background:linear-gradient(90deg,#6ddc9a,#2d8a5a);margin-bottom:0">🔍 全員ギャップ分析</button>
<p class="hint" id="analyze-all-status" style="margin-top:4px;margin-bottom:8px"></p>
<button class="btn-all" onclick="saveAll()">✦ 全員まとめて保存</button>
<button class="btn-export" onclick="openExport()">📤 JSファイルを書き出す（鑑定書に反映）</button>
<p class="hint">書き出したJSをdeep_report_overrides.jsとして保存し、GitHubにpushすると鑑定書に反映されます</p>

<!-- エクスポートモーダル -->
<div class="modal-overlay" id="exportModal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2>📤 deep_report_overrides.js の内容</h2>
      <button class="modal-close" onclick="document.getElementById('exportModal').style.display='none'">✕ 閉じる</button>
    </div>
    <p style="color:var(--muted);font-size:12px;margin-bottom:10px">下のテキストをすべてコピーして、<code>deep_report_overrides.js</code> というファイルに保存してください。</p>
    <button onclick="copyExport()" style="background:rgba(241,217,155,.2);border:1px solid rgba(241,217,155,.4);color:var(--gold2);border-radius:8px;padding:7px 18px;font-size:13px;cursor:pointer;margin-bottom:10px">📋 全てコピー</button>
    <textarea class="export-area" id="exportArea" readonly></textarea>
  </div>
</div>

<!-- 鑑定書プレビューモーダル -->
<div class="modal-overlay" id="previewModal" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box modal-preview">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2>👁 鑑定書プレビュー</h2>
      <button class="modal-close" onclick="document.getElementById('previewModal').style.display='none'">✕ 閉じる</button>
    </div>
    <div id="previewContent"></div>
  </div>
</div>

function analyzeShukuGap(diaryText, shuku) {
  var a = SHUKU_ANALYSIS[shuku];
  if (!a || !diaryText) return null;
  var hitWords = [];
  a.keywords.forEach(function(kw){ if (diaryText.indexOf(kw) !== -1) hitWords.push(kw); });
  return { aligned: hitWords.length >= 2, hitCount: hitWords.length, hitWords: hitWords, label: a.label };
}

// ===== qテキストからの具体テーマ抽出 =====
var KEY_THEME_RULES = [
  { kws: ['起業','独立'],               label: '起業・独立への道' },
  { kws: ['ビジネス','事業','講座'],    label: 'ビジネスの展開' },
  { kws: ['退職','辞め','やめる'],      label: '新しいステージへの移行' },
  { kws: ['転職'],                      label: '働き方の転換' },
  { kws: ['使命','やりたいこと','天職'], label: '使命・本当にやりたいこと探し' },
  { kws: ['副業','収入の柱'],           label: '収入の柱を増やすこと' },
  { kws: ['借金','返済','自己破産'],    label: 'お金の流れのリセット' },
  { kws: ['収入','稼ぐ','稼げ'],        label: '収入アップ' },
  { kws: ['結婚'],                      label: '結婚・パートナーシップ' },
  { kws: ['離婚'],                      label: '新しいつながりへの扉' },
  { kws: ['息子','娘','子供','子ども','受験'], label: '子供・家族の未来' },
  { kws: ['介護'],                      label: '介護と自分の両立' },
  { kws: ['リウマチ','病気','療養','休職'], label: '体の回復と心の安定' },
  { kws: ['不安','心配'],               label: '不安の解放' },
  { kws: ['人間関係','嫉妬','ライバル'], label: '人間関係の整え' },
  { kws: ['退屈','やる気','熱量'],      label: '情熱の再点火' },
  { kws: ['自分らしさ','本音','本当の自分'], label: '本当の自分を取り戻すこと' }
];

function extractKeyTheme(qText) {
  var t = qText || '';
  for (var i = 0; i < KEY_THEME_RULES.length; i++) {
    var hit = KEY_THEME_RULES[i].kws.some(function(kw){ return t.indexOf(kw) !== -1; });
    if (hit) return KEY_THEME_RULES[i].label;
  }
  return null;
}

function extractQAction(qText) {
  var t = qText || '';
  if (/起業|独立/.test(t))             return '「これをやる」と決めた一つを、今週中に小さく動かしてみてください。完璧な準備より、動き始めることがエネルギーを生みます。';
  if (/ビジネス|講座|事業/.test(t))    return '今取り組んでいることを続けながら、発信の形をひとつだけ変えてみることがヒントになります。';
  if (/退職|辞め|転職/.test(t))        return '今感じているモヤモヤは、次の方向性のヒントです。急がず、感じ続けてください。';
  if (/使命|やりたいこと|天職/.test(t)) return '「好きなこと」と「自然にできること」が重なる瞬間を、日常の中でひとつ見つけてください。';
  if (/副業/.test(t))                   return '今ある資源（時間・得意・人脈）をひとつ書き出してみることが、次の柱の種になります。';
  if (/借金|返済|自己破産/.test(t))     return 'まず現状を紙に書き出すこと。それだけで、お金の流れは動き始めます。';
  if (/収入|稼ぐ|稼げ/.test(t))         return '収入より先に「何を提供したいか」を一言で言えるようにすると、流れが変わります。';
  if (/結婚/.test(t))                   return '自分が心地よいと感じる関係のかたちを、一言で書いてみてください。';
  if (/息子|娘|子供|受験/.test(t))      return '大切な人の未来を信頼することが、あなた自身の力になります。';
  if (/介護/.test(t))                   return '自分を満たすことが、支える力になります。まず自分へのやさしさを一つ選んでください。';
  if (/リウマチ|病気|療養|休職/.test(t)) return '今日の体の声をひとつ聞いてあげることが、最大の開運行動です。';
  if (/不安|心配/.test(t))              return '不安を感じている自分に「よく気づいているね」と声をかけてあげてください。それが解放の入口です。';
  if (/人間関係|嫉妬/.test(t))          return '距離感を一つ整えるだけで、エネルギーの流れが変わります。';
  if (/自分らしさ|本当の自分/.test(t))  return '「これは自分らしい」と感じる瞬間を、今日一つ見つけてください。';
  return null;
}

// ===== セクション自動生成 =====
function openingFromConcern(concern) {
  return /仕事/.test(concern)             ? 'この7日間で、あなたは「働く自分」を深いところから見つめてきました。'
       : /お金/.test(concern)             ? 'この7日間で、あなたは「豊かさ」というテーマと静かに向き合いました。'
       : /恋愛/.test(concern)             ? 'この7日間で、あなたは「つながり」という深いテーマを歩きました。'
       : /家族/.test(concern)             ? 'この7日間で、あなたは「縁」というテーマを丁寧に歩きました。'
       : /健康/.test(concern)             ? 'この7日間で、あなたは「体と心の声」に耳を澄ませてきました。'
       : /自分らしさ|生き方/.test(concern) ? 'この7日間で、あなたは「自分とは何者か」という問いを歩きました。'
       : 'この7日間で、あなたは自分の内側と静かに向き合ってきました。';
}

function genSection1(concern, q, shuku, diary) {
  var keyTheme = extractKeyTheme(q || '');
  var opening = keyTheme
    ? 'この7日間で、あなたは「' + keyTheme + '」というテーマと向き合ってきました。'
    : openingFromConcern(concern);
  var gap = analyzeShukuGap(diary, shuku);
  var a = SHUKU_ANALYSIS[shuku];
  if (gap && a) {
    if (gap.aligned) {
      return opening + '\n\n日記の言葉に、あなたの宿命「' + a.label + '」が自然に現れています。その感覚は本物です。その流れをさらに信じて深めていくときです。';
    } else {
      return opening + '\n\n感情に気づく力は育っています。「' + a.label + '」というあなたの宿命の力が、まだ日常の表に出てきていない段階かもしれません。それは今後の伸びしろです。';
    }
  }
  return opening + '\n\n答えはまだ出ていなくていい。今のあなたは、表面的な正解ではなく、心の奥にある本当の動機と向き合う段階にいます。';
}

function genSection2(concern, q, shuku, diary) {
  var keyTheme = extractKeyTheme(q || '');
  var gap = analyzeShukuGap(diary, shuku);

  // 日記から実際にヒットした言葉を直接引用して構成
  if (diary && gap && gap.hitWords && gap.hitWords.length > 0) {
    var words = gap.hitWords.slice(0, 3);
    var wordStr = words.map(function(w){ return '「' + w + '」'; }).join('、');
    if (gap.aligned) {
      return '日記の中から、' + wordStr + 'という言葉が自然に出てきていました。\nその言葉はあなた自身が選んだもの。宿命の力がすでに日常の中で動いているサインです。';
    } else {
      return '日記の言葉の中に、' + wordStr + 'という表現がありました。\nその感覚はまだ小さな芽かもしれません。でも、気づいているということは、もう動き始めています。';
    }
  }

  // 日記がない・ヒットなしの場合はqテーマ→concernで構成
  if (keyTheme) return '「' + keyTheme + '」のテーマが、7日間を通じてあなたの中で育っています。\nこのテーマは、今のあなたにとって最も大切な開運の扉の一つです。';
  if (/仕事/.test(concern))             return '仕事と使命へのテーマが育っています。あなたが今感じている「こうありたい」という声こそが、次の扉のカギです。';
  if (/お金/.test(concern))             return '豊かさへの意識が、意欲という形で育っています。お金との関係を見つめ直すことが、今のあなたにとって大切なテーマです。';
  if (/恋愛/.test(concern))             return '愛とつながりのテーマが育っています。誰かを大切にする前に、自分自身への愛を深める流れにあります。';
  if (/家族/.test(concern))             return '家族と縁のテーマが育っています。大切な人との関係の中で、自分の役割を新たな視点で見つめています。';
  if (/健康/.test(concern))             return '心と体の調和のテーマが育っています。日常の中で自分を大切にする習慣が、今のあなたへの月からの誘いです。';
  if (/自分らしさ|生き方/.test(concern)) return '自分らしい生き方のテーマが育っています。「本当はどう生きたいか」という問いと、静かに向き合っています。';
  return '内側の変化のテーマが育っています。今見えていることの先に、次の扉があります。';
}

function genSection4(shuku, q, diary) {
  var sd = SHUKU_MSG[shuku] || {next:''};
  var a = SHUKU_ANALYSIS[shuku];
  var gap = analyzeShukuGap(diary, shuku);
  var qAction = extractQAction(q || '');
  if (gap && a) {
    var shukuAdvice = gap.aligned ? a.alignAdvice : a.gapAdvice;
    return shukuAdvice + (qAction ? '\n\n' + qAction : '');
  }
  var base = sd.next || '';
  return qAction ? base + '\n\n' + qAction : base + '\n\nこの7日間で感じたこと、気づいたことを、ぜひ日常のひとつひとつと結びつけてみてください。月のリズムは、続きます。';
}

// ===== ローカルストレージ =====
function storageKey(pid) { return 'deepReportEdit:' + pid; }

function loadSaved(pid) {
  try { return JSON.parse(localStorage.getItem(storageKey(pid)) || '{}'); }
  catch(e) { return {}; }
}

function saveData(pid, data) {
  localStorage.setItem(storageKey(pid), JSON.stringify(data));
}

// ===== カード生成 =====
function buildCard(p) {
  var saved = loadSaved(p.pid);
  var keyTheme = extractKeyTheme(p.q || '');
  var isDone = !!(saved.s1 || saved.s2 || saved.s3 || saved.s4 || saved.kanon);

  var div = document.createElement('div');
  div.id = 'card-' + p.pid;
  div.className = 'card' + (isDone ? ' done' : '');
  div.dataset.pid = p.pid;
  div.dataset.done = isDone ? '1' : '0';

  var keyThemeBadge = keyTheme
    ? '<span class="key-theme-badge">🔑 ' + keyTheme + '</span>'
    : '';
  var qDisplay =
    (p.q && p.q !== 'テスト用参加者'
      ? '<div class="q-label">📝 最初のお悩み文章（登録済み）</div><div class="q-box">' + esc(p.q) + '</div>'
      : '') +
    '<div class="section-label">✏️ お悩み・目標（追記・編集）</div>' +
    '<div class="section-hint">登録時の文章がない場合、またはより詳しく書きたい場合にここへ入力すると自動生成に反映されます</div>' +
    '<textarea class="textarea" name="q_edit" style="min-height:60px" data-field="q_edit" placeholder="例：ライスワークをライフワークにシフトしたい。収入を安定させて自由な働き方を実現したい...">' + esc(saved.q_edit || '') + '</textarea>';

  div.innerHTML =
    '<div class="card-header">' +
      '<span class="no">' + p.pid + '</span>' +
      '<span class="pname">' + p.name + '</span>' +
      '<span class="shuku">' + p.shuku + '</span>' +
      '<span class="concern">' + p.concern + '</span>' +
      keyThemeBadge +
    '</div>' +
    qDisplay +

    '<div class="section-label">📔 日記の内容（宿命ギャップ分析用・任意）</div>' +
    '<div class="section-hint">スプレッドシートのDay1〜7の回答をコピーして貼り付けると、宿命との照らし合わせ分析が自動生成に反映されます</div>' +
    '<textarea class="textarea" name="diary" style="min-height:70px;font-size:12px;color:rgba(220,210,240,.85);line-height:1.8" data-field="diary" placeholder="Day1「今日感謝したことは…」Day2「気づいたことは…」Day3「変化は…」…\n本人の言葉をそのままコピーして貼り付けてください">' + esc(saved.diary || '') + '</textarea>' +
    '<button class="btn-analyze" onclick="runGapAnalysis(\'' + p.pid + '\')">🔍 ギャップを分析する</button>' +
    '<div class="gap-panel" id="gap-panel-' + p.pid + '"></div>' +

    '<div class="section-label" style="margin-top:12px">📝 分析メモ（かのん内部用）</div>' +
    '<div class="section-hint">分析を見て気づいたこと・伝えたいポイントをメモ。自動生成・書き出しには含まれません</div>' +
    '<textarea class="textarea memo-note" name="kanon_memo" data-field="kanon_memo" placeholder="例：感情の言葉は豊かだが「言葉にして伝える」行動が少ない。觜宿の力をまだ出し切れていない印象。次のアドバイスは「書いて発信する」行動を一つ勧める。">' + esc(saved.kanon_memo || '') + '</textarea>' +

    '<hr class="divider">' +

    '<div class="section-label">☽ いまのあなたの現在地（セクション1）</div>' +
    '<textarea class="textarea" name="s1" data-field="s1">' + esc(saved.s1 || '') + '</textarea>' +

    '<div class="section-label">☽ 強く育っているテーマ（セクション2）</div>' +
    '<textarea class="textarea" name="s2" data-field="s2">' + esc(saved.s2 || '') + '</textarea>' +

    '<div class="section-label">☽ 宿曜から見た土台資質（セクション3）— ' + p.shuku + '</div>' +
    '<textarea class="textarea" name="s3" data-field="s3">' + esc(saved.s3 || '') + '</textarea>' +

    '<div class="section-label">☽ 次章へ向かうための提案（セクション4）</div>' +
    '<textarea class="textarea" name="s4" data-field="s4">' + esc(saved.s4 || '') + '</textarea>' +

    '<div class="section-label">💙 かのんからの一言（個人メモ・任意）</div>' +
    '<div class="section-hint">ここに書いた内容が「かのんからのメッセージ」として鑑定書に表示されます</div>' +
    '<textarea class="textarea kanon-note" name="kanon" data-field="kanon">' + esc(saved.kanon || '') + '</textarea>' +

    '<div class="btn-row">' +
      '<button class="btn-gen" onclick="autoGen(\'' + p.pid + '\')">✨ 自動生成（上書き確認あり）</button>' +
      '<button class="btn-save" onclick="saveCard(\'' + p.pid + '\')">💾 保存</button>' +
      '<button class="btn-preview" onclick="showPreview(\'' + p.pid + '\')">👁 鑑定書プレビュー</button>' +
      '<button class="btn-copy" onclick="copyCard(\'' + p.pid + '\')">📋 全文コピー（LINE送信用）</button>' +
      '<span class="saved-badge" id="badge-' + p.pid + '">✅ 保存済み</span>' +
    '</div>';

  if (isDone) {
    div.querySelector('#badge-' + p.pid).className = 'saved-badge show';
  }

  return div;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== ギャップ分析パネル =====
var DIARY_THEMES = [
  { label:'感情・感覚', kws:['嬉しい','楽しい','悲しい','不安','ワクワク','満たされ','つらい','しんどい','幸せ','怖い','安心','焦り'] },
  { label:'感謝・喜び',  kws:['ありがとう','感謝','良かった','助かった','救われ','喜び'] },
  { label:'行動・挑戦', kws:['やった','動いた','始めた','試した','挑戦','できた','行動','踏み出'] },
  { label:'思考・気づき',kws:['気づいた','考えた','わかった','なぜ','理解','分かった','発見','気づき'] },
  { label:'言葉・発信', kws:['話した','伝えた','書いた','聞いた','説明','発信','伝え','話す'] },
  { label:'学び・知識', kws:['学んだ','知識','勉強','読んだ','調べた','学び','インプット'] },
  { label:'つながり・関係', kws:['会った','話した','つながり','縁','友達','仲間','家族'] },
  { label:'日常・習慣', kws:['毎日','習慣','続け','いつも','日課','くり返'] }
];

function runGapAnalysisWithText(pid, diary) {
  var p = PARTICIPANTS.find(function(x){ return x.pid === pid; });
  var panel = document.getElementById('gap-panel-' + pid);

  var a = SHUKU_ANALYSIS[p.shuku];
  if (!a) { panel.innerHTML = '<p style="color:var(--muted);font-size:11px">この宿のデータがありません</p>'; panel.style.display='block'; return; }

  var kwResults = a.keywords.map(function(kw){ return { kw:kw, hit: diary.indexOf(kw) !== -1 }; });
  var hitCount = kwResults.filter(function(r){ return r.hit; }).length;
  var total = kwResults.length;
  var aligned = hitCount >= 2;

  var foundThemes = DIARY_THEMES.filter(function(t){
    return t.kws.some(function(kw){ return diary.indexOf(kw) !== -1; });
  }).map(function(t){ return t.label; });

  var missingKws = kwResults.filter(function(r){ return !r.hit; }).map(function(r){ return r.kw; });

  var gapLevel = hitCount === 0 ? '宿命の力がまだ日常に現れていない段階'
               : hitCount === 1 ? '宿命の力が少し顔を出し始めている段階'
               : hitCount <= 3 ? '宿命の力が使われてきている段階'
               :                  '宿命の力が日常によく現れている段階';

  var levelColor = hitCount <= 1 ? '#e8a0a0' : hitCount <= 3 ? '#f1d99b' : '#6ddc9a';

  var kwHtml = kwResults.map(function(r){
    return '<span class="' + (r.hit ? 'kw-hit' : 'kw-miss') + '">' + (r.hit ? '✓ ' : '✗ ') + r.kw + '</span>';
  }).join('');

  var pips = '';
  for (var i = 0; i < total; i++) {
    pips += '<span class="gap-pip" style="background:' + (i < hitCount ? '#6ddc9a' : 'rgba(255,255,255,.15)') + '"></span>';
  }

  panel.innerHTML =
    '<div style="font-size:11px;color:#6ddc9a;letter-spacing:.08em;margin-bottom:8px">🔍 ギャップ分析　' + p.shuku + '「' + a.label + '」</div>' +
    '<div style="margin-bottom:7px">' + kwHtml + '</div>' +
    '<div class="gap-score-bar">' + pips + '<span class="gap-label">' + hitCount + '/' + total + '　<span style="color:' + levelColor + '">' + gapLevel + '</span></span></div>' +
    (foundThemes.length ? '<div class="gap-themes">日記に多いテーマ：' + foundThemes.join('　・　') + '</div>' : '') +
    (missingKws.length && !aligned
      ? '<div class="gap-miss-note">宿命で不足：' + missingKws.join('・') + '　← 日常に取り入れると宿命が活かされます</div>'
      : '') +
    (aligned ? '<div style="font-size:11px;color:#6ddc9a">✦ 宿命の力が日記の言葉に現れています</div>' : '');

  panel.style.display = 'block';
}

function runGapAnalysis(pid) {
  var p = PARTICIPANTS.find(function(x){ return x.pid === pid; });
  var card = document.querySelector('.card[data-pid="' + pid + '"]');
  var panel = document.getElementById('gap-panel-' + pid);
  var diaryTA = card.querySelector('[data-field="diary"]');
  var diary = diaryTA ? diaryTA.value.trim() : '';

  // 日記テキストが入力済みならそのまま分析
  if (diary) { runGapAnalysisWithText(pid, diary); return; }

  // 空の場合はスプレッドシートから自動取得
  panel.innerHTML = '<p style="color:var(--muted);font-size:11px">スプレッドシートから日記データを取得中…</p>';
  panel.style.display = 'block';

  var gasUrl = 'https://script.google.com/macros/s/AKfycbxIffIfAOptA-WR6jjT9dg8Fc0yb9HpwsLTR-ZG43Nw12_KR_Yi0Xj9IT_FAyXGV_Ic/exec';
  var secretKey = 'tsukiyomi-2026-key';
  var email = p.email || '';

  function fetchAndAnalyze(idParam) {
    var fetchUrl = gasUrl + '?' + idParam + '&secretKey=' + encodeURIComponent(secretKey) + '&t=' + Date.now();
    return fetch(fetchUrl, { redirect: 'follow' }).then(function(r){ return r.json(); });
  }

  fetchAndAnalyze('email=' + encodeURIComponent(email))
    .then(function(result){
      if (result && result.ok && result.days && Object.keys(result.days).length > 0) return result;
      // emailで見つからない場合はpidでフォールバック
      return fetchAndAnalyze('pid=' + encodeURIComponent(pid));
    })
    .then(function(result){
      if (!result || !result.ok || !result.days || Object.keys(result.days).length === 0) {
        var fallbackText = [p.q, p.q2].filter(Boolean).join('\n');
        if (!fallbackText) {
          panel.innerHTML = '<p style="color:#e8a0a0;font-size:11px">日記データが見つかりませんでした。スプレッドシートに記録がないか、まだ送信されていない可能性があります。</p>';
          return;
        }
        panel.innerHTML = '<p style="color:#aaa;font-size:11px">※日記未提出のためプロフィール情報で分析します</p>';
        if (diaryTA) diaryTA.value = fallbackText;
        runGapAnalysisWithText(pid, fallbackText);
        return;
      }
      var lines = [];
      for (var d = 1; d <= 7; d++) {
        var dayData = result.days[String(d)];
        if (!dayData || !dayData.lines) continue;
        dayData.lines.forEach(function(l){ if ((l.text || '').trim()) lines.push(l.text.trim()); });
      }
      var fetchedDiary = lines.join('\n');
      if (diaryTA) diaryTA.value = fetchedDiary;
      runGapAnalysisWithText(pid, fetchedDiary);
    })
    .catch(function(){
      var fallbackText = [p.q, p.q2].filter(Boolean).join('\n');
      if (fallbackText) {
        panel.innerHTML = '<p style="color:#aaa;font-size:11px">※プロフィール情報で分析します</p>';
        if (diaryTA) diaryTA.value = fallbackText;
        runGapAnalysisWithText(pid, fallbackText);
      } else {
        panel.innerHTML = '<p style="color:#e8a0a0;font-size:11px">取得に失敗しました。ネットワーク接続を確認してください。</p>';
      }
    });

}

// ===== 自動生成 =====
function autoGen(pid) {
  var p = PARTICIPANTS.find(function(x){ return x.pid === pid; });
  if (!p) return;
  var sd = SHUKU_MSG[p.shuku] || {quality:'', next:''};
  var card = document.querySelector('.card[data-pid="' + pid + '"]');

  var diaryTA = card.querySelector('[data-field="diary"]');
  var diary = diaryTA ? diaryTA.value.trim() : '';

  var qEditTA = card.querySelector('[data-field="q_edit"]');
  var qText = (qEditTA && qEditTA.value.trim()) || p.q || '';

  var fields = {
    s1: genSection1(p.concern, qText, p.shuku, diary),
    s2: genSection2(p.concern, qText, p.shuku, diary),
    s3: (p.shuku ? '【' + p.shuku + '】' + (SHUKU_ANALYSIS[p.shuku] ? '　' + SHUKU_ANALYSIS[p.shuku].label : '') + '\n' + sd.quality : '宿曜情報がありません。'),
    s4: genSection4(p.shuku, qText, diary)
  };

  var hasContent = false;
  ['s1','s2','s3','s4'].forEach(function(f){
    var ta = card.querySelector('[data-field="' + f + '"]');
    if (ta && ta.value.trim()) hasContent = true;
  });

  if (hasContent && !confirm(p.name + ' さんの内容を自動生成で上書きしますか？\nかのんからの一言は上書きされません。')) return;

  Object.keys(fields).forEach(function(f){
    var ta = card.querySelector('[data-field="' + f + '"]');
    if (ta) ta.value = fields[f];
  });
}

// ===== 保存 =====
function saveCard(pid) {
  var card = document.querySelector('.card[data-pid="' + pid + '"]');
  var data = { done: true };
  card.querySelectorAll('[data-field]').forEach(function(ta){
    data[ta.dataset.field] = ta.value;
  });
  saveData(pid, data);
  card.classList.add('done');
  card.dataset.done = '1';
  var badge = card.querySelector('#badge-' + pid);
  if (badge) badge.className = 'saved-badge show';
  refreshChip(pid);
  updateProgress();
}

function saveAll() {
  PARTICIPANTS.forEach(function(p){ saveCard(p.pid); });
  alert('全員分を保存しました！');
}

function analyzeAll() {
  var pids = PARTICIPANTS.map(function(p){ return p.pid; });
  var index = 0;
  var status = document.getElementById('analyze-all-status');
  status.textContent = '分析中… 0 / ' + pids.length;

  function next() {
    if (index >= pids.length) {
      status.textContent = '✓ 全員の分析が完了しました（' + pids.length + '名）';
      return;
    }
    var pid = pids[index];
    var p = PARTICIPANTS.find(function(x){ return x.pid === pid; });
    status.textContent = '分析中… ' + (index + 1) + ' / ' + pids.length + '　（' + p.name + '）';
    index++;
    runGapAnalysis(pid);
    setTimeout(next, 600);
  }

  next();
}

// ===== コピー =====
function copyCard(pid) {
  var p = PARTICIPANTS.find(function(x){ return x.pid === pid; });
  var card = document.querySelector('.card[data-pid="' + pid + '"]');
  var s1 = card.querySelector('[data-field="s1"]').value.trim();
  var s2 = card.querySelector('[data-field="s2"]').value.trim();
  var s3 = card.querySelector('[data-field="s3"]').value.trim();
  var s4 = card.querySelector('[data-field="s4"]').value.trim();
  var kanon = card.querySelector('[data-field="kanon"]').value.trim();

  var text = p.name + ' さんへ\n\n';
  text += '☽ いまのあなたの現在地\n' + s1 + '\n\n';
  text += '☽ 強く育っているテーマ\n' + s2 + '\n\n';
  text += '☽ 宿曜から見た土台資質\n' + s3 + '\n\n';
  text += '☽ 次章へ向かうための提案\n' + s4 + '\n';
  if (kanon) text += '\n💙 かのんより\n' + kanon + '\n';

  navigator.clipboard.writeText(text).then(function(){
    alert(p.name + ' さんの全文をコピーしました！LINEに貼り付けてください。');
  }).catch(function(){
    prompt('以下をコピーしてください：', text);
  });
}

// ===== フィルター =====
function filterCards(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(function(card){
    var done = card.dataset.done === '1';
    if (type === 'all') card.style.display = '';
    else if (type === 'done') card.style.display = done ? '' : 'none';
    else if (type === 'empty') card.style.display = !done ? '' : 'none';
  });
}

// ===== 進捗 =====
function updateProgress() {
  var total = PARTICIPANTS.length;
  var done = document.querySelectorAll('.card.done').length;
  document.getElementById('progressLabel').textContent = '保存済み：' + done + ' / ' + total + ' 人';
  document.getElementById('progressBar').style.width = Math.round(done / total * 100) + '%';
}

// ===== JSエクスポート =====
function openExport() {
  var out = {};
  PARTICIPANTS.forEach(function(p){
    var saved = loadSaved(p.pid);
    if (saved.s1 || saved.s2 || saved.s3 || saved.s4 || saved.kanon) {
      out[p.pid] = {
        s1: saved.s1 || '',
        s2: saved.s2 || '',
        s3: saved.s3 || '',
        s4: saved.s4 || '',
        kanon: saved.kanon || '',
        done: true
      };
    }
  });

  var lines = ['// 第2の鑑定書 かのんチェック済みコンテンツ'];
  lines.push('// このファイルは kanon_deep_report_editor.html で生成されます');
  lines.push('// ファイル名: deep_report_overrides.js');
  lines.push('window.DEEP_REPORT_OVERRIDES = ' + JSON.stringify(out, null, 2) + ';');

  document.getElementById('exportArea').value = lines.join('\n');
  document.getElementById('exportModal').style.display = 'block';
}

function copyExport() {
  var ta = document.getElementById('exportArea');
  navigator.clipboard.writeText(ta.value).then(function(){
    alert('コピーしました！\ndeep_report_overrides.js として保存してGitHubにpushしてください。');
  }).catch(function(){
    ta.select();
    document.execCommand('copy');
    alert('コピーしました！');
  });
}

// ===== ジャンプナビ =====
function buildJumpNav() {
  var list = document.getElementById('jumpNavList');
  if (!list) return;
  list.innerHTML = '';
  PARTICIPANTS.forEach(function(p) {
    var saved = loadSaved(p.pid);
    var isDone = !!(saved.s1 || saved.s2 || saved.s3 || saved.s4 || saved.kanon);
    var btn = document.createElement('button');
    btn.className = 'jump-chip' + (isDone ? ' done' : '');
    btn.id = 'chip-' + p.pid;
    btn.textContent = p.name;
    btn.onclick = function() { jumpToCard(p.pid); };
    list.appendChild(btn);
  });
}

function jumpToCard(pid) {
  // フィルターがかかっていてもカードを表示させる
  var card = document.getElementById('card-' + pid);
  if (card && card.style.display === 'none') {
    filterCards('all', document.querySelector('.filter-btn'));
  }
  setTimeout(function() {
    var el = document.getElementById('card-' + pid);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 30);
}

function refreshChip(pid) {
  var chip = document.getElementById('chip-' + pid);
  if (!chip) return;
  var saved = loadSaved(pid);
  var isDone = !!(saved.s1 || saved.s2 || saved.s3 || saved.s4 || saved.kanon);
  chip.className = 'jump-chip' + (isDone ? ' done' : '');
}

// ===== 鑑定書プレビュー =====
function showPreview(pid) {
  var p = PARTICIPANTS.find(function(x){ return x.pid === pid; });
  if (!p) return;
  var card = document.querySelector('.card[data-pid="' + pid + '"]');
  function readField(field) {
    var ta = card ? card.querySelector('[data-field="' + field + '"]') : null;
    if (ta && ta.value.trim()) return ta.value.trim();
    return (loadSaved(pid)[field] || '');
  }
  var s1 = readField('s1');
  var s2 = readField('s2');
  var s3 = readField('s3');
  var s4 = readField('s4');
  var kanon = readField('kanon');

  function row(title, body, extraClass) {
    if (!body) return '';
    return '<div class="preview-section' + (extraClass ? ' ' + extraClass : '') + '">' +
      '<h3>' + title + '</h3>' +
      '<p>' + esc(body).replace(/\n/g, '<br>') + '</p>' +
    '</div>';
  }

  var html = '<div class="preview-report">' +
    '<div class="preview-header">' +
      '<p class="preview-day-label">SECOND READING</p>' +
      '<p class="preview-title">月の扉｜第2の鑑定書</p>' +
      '<p class="preview-meta">' + esc(p.name) + ' さん　' + esc(p.shuku) + '</p>' +
    '</div>';

  if (!s1 && !s2 && !s3 && !s4) {
    html += '<p class="preview-empty">まだ内容が入力されていません。<br>「自動生成」または手動入力してから確認してください。</p>';
  } else {
    html += row('☽ いまのあなたの現在地', s1);
    html += row('☽ 強く育っているテーマ', s2);
    html += row('☽ 宿曜から見た、あなたの土台資質', s3);
    html += row('☽ 次章へ向かうための提案', s4);
    if (kanon) html += row('💙 かのんより', kanon, 'preview-kanon');
  }

  html += '</div>';
  document.getElementById('previewContent').innerHTML = html;
  document.getElementById('previewModal').style.display = 'block';
}

// ===== 初期化 =====
(function init() {
  var container = document.getElementById('cards');
  PARTICIPANTS.forEach(function(p){
    container.appendChild(buildCard(p));
  });
  buildJumpNav();
  updateProgress();
})();
</script>
