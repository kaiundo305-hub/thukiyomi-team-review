<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月読み日記 振り返り鑑定書 生成ツール</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Dancing+Script:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Noto Serif JP", serif;
            background: #04050f;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        #space-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .moon {
            position: fixed; top: 30px; right: 50px;
            width: 90px; height: 90px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fffde0, #f5d97a 40%, #c8a84b 70%, #8a6a1a);
            box-shadow: 0 0 30px 10px rgba(245,217,122,0.35), 0 0 80px 30px rgba(200,168,75,0.15), inset -15px -8px 30px rgba(0,0,0,0.35);
            pointer-events: none; z-index: 0;
            animation: moonGlow 6s ease-in-out infinite;
        }

        @keyframes moonGlow {
            0%,100% { box-shadow: 0 0 30px 10px rgba(245,217,122,0.35), 0 0 80px 30px rgba(200,168,75,0.15), inset -15px -8px 30px rgba(0,0,0,0.35); }
            50%      { box-shadow: 0 0 50px 20px rgba(245,217,122,0.5), 0 0 120px 50px rgba(200,168,75,0.25), inset -15px -8px 30px rgba(0,0,0,0.35); }
        }

        .main-container {
            position: relative; z-index: 1;
            max-width: 960px; margin: 0 auto;
            padding: 30px 20px 60px;
        }

        .page-header { text-align: center; margin-bottom: 28px; }
        .page-header h1 { font-size: 24px; color: #f5d97a; letter-spacing: 0.08em; margin-bottom: 8px; }
        .page-header .subtitle { font-size: 13px; color: #a5b4fc; }

        /* ── 検索 ── */
        .search-wrap { text-align: center; margin-bottom: 20px; }
        .search-wrap input {
            background: #1a1c4b; border: 1px solid #4a6cf7;
            color: #fff; border-radius: 8px;
            padding: 10px 16px; font-size: 14px;
            width: 320px; max-width: 90%;
        }

        /* ── 参加者カード ── */
        #participantGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px; margin-bottom: 30px;
        }

        .p-card {
            background: rgba(26,28,75,0.85);
            border: 1px solid #2d2f6b; border-radius: 12px;
            padding: 16px 14px; cursor: pointer;
            transition: all 0.2s; position: relative;
        }
        .p-card:hover { border-color: #f5d97a; background: rgba(30,35,90,0.9); }
        .p-card.active { border-color: #f5d97a; box-shadow: 0 0 16px rgba(245,217,122,0.25); }
        .p-card-num { font-size: 10px; color: #4a5568; margin-bottom: 4px; }
        .p-card-name { font-size: 15px; font-weight: bold; color: #e0d0ff; margin-bottom: 4px; }
        .p-card-shuku { font-size: 13px; color: #f5d97a; }
        .p-card-birth { font-size: 11px; color: #64748b; margin-top: 4px; }
        .p-card-badge {
            font-size: 11px; padding: 2px 8px; border-radius: 10px;
            background: rgba(124,58,237,0.2); color: #c4b5fd;
            display: inline-block; margin-top: 4px;
        }
        .p-card-done { background: rgba(5,150,105,0.2); color: #6ee7b7; }

        .stats-bar { text-align: center; font-size: 12px; color: #64748b; margin-bottom: 12px; }

        /* ── AI設定 ── */
        .api-settings-panel {
            background: rgba(15,17,50,0.8); border: 1px solid #2d2f6b;
            border-radius: 12px; margin-bottom: 20px; overflow: hidden;
        }
        .api-settings-toggle {
            width: 100%; background: none; border: none; color: #a5b4fc;
            padding: 14px 18px; font-size: 13px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            font-family: "Noto Serif JP", serif;
        }
        .api-settings-body { padding: 14px 18px; border-top: 1px solid #2d2f6b; display: none; }
        .api-key-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .api-key-input {
            flex: 1; min-width: 200px; background: rgba(0,0,0,0.3);
            border: 1px solid #4a6cf7; color: #fff; border-radius: 6px;
            padding: 8px 12px; font-size: 13px;
        }
        .btn-save-key {
            background: rgba(124,58,237,0.3); border: 1px solid #7c3aed;
            color: #c4b5fd; border-radius: 6px; padding: 8px 14px;
            font-size: 12px; cursor: pointer; white-space: nowrap;
            font-family: "Noto Serif JP", serif;
        }
        .btn-save-key:hover { opacity: 0.8; }
        .api-key-note { font-size: 11px; color: #64748b; line-height: 1.6; }

        /* ── 鑑定書エリア ── */
        #resultArea { display: none; position: relative; z-index: 1; }

        .back-btn {
            background: rgba(74,108,247,0.2); border: 1px solid #4a6cf7;
            color: #a5b4fc; border-radius: 8px; padding: 10px 20px;
            font-size: 14px; cursor: pointer; margin-bottom: 20px;
            display: inline-flex; align-items: center; gap: 8px;
            font-family: "Noto Serif JP", serif;
        }
        .back-btn:hover { background: rgba(74,108,247,0.35); }

        /* 日記入力エリア */
        .diary-input-section {
            background: rgba(15,17,50,0.85); border: 1px solid rgba(124,58,237,0.4);
            border-radius: 14px; padding: 20px 24px; margin-bottom: 24px;
        }
        .diary-input-section h3 {
            font-size: 14px; color: #c4b5fd; margin-bottom: 12px;
            letter-spacing: 0.08em; border-bottom: 1px solid rgba(124,58,237,0.25); padding-bottom: 8px;
        }
        .diary-textarea {
            width: 100%; min-height: 180px; background: rgba(0,0,0,0.3);
            border: 1px solid #4a6cf7; color: #e0d0ff; border-radius: 8px;
            padding: 12px 14px; font-size: 13px; line-height: 1.8;
            resize: vertical; font-family: "Noto Serif JP", serif;
        }
        .diary-textarea::placeholder { color: #4a5568; }
        .diary-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

        .btn-ai {
            background: rgba(124,58,237,0.35); border: 1px solid #7c3aed;
            color: #e0d0ff; border-radius: 8px; padding: 12px 22px;
            font-size: 14px; cursor: pointer; font-family: "Noto Serif JP", serif;
            transition: all 0.2s;
        }
        .btn-ai:hover:not(:disabled) { background: rgba(124,58,237,0.55); }
        .btn-ai:disabled { opacity: 0.5; cursor: not-allowed; }

        .ai-spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(196,181,253,0.3); border-top-color: #c4b5fd;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .ai-status { font-size: 12px; color: #a5b4fc; margin-top: 8px; min-height: 16px; }

        /* 鑑定書カード */
        .result-card {
            background: #fff; color: #111;
            border: 3px double #b8960c; border-radius: 16px;
            padding: 32px 36px; max-width: 720px; margin: 0 auto;
            position: relative; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        .corner-ornament {
            position: absolute; width: 28px; height: 28px;
            border-color: #b8960c; border-style: solid; border-radius: 2px;
        }
        .corner-tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
        .corner-tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

        .cert-title-banner { text-align: center; margin-bottom: 20px; }
        .ctb-event { font-size: 10px; color: #b8960c; letter-spacing: 3px; margin-bottom: 6px; }
        .ctb-deco { font-size: 12px; color: #b8960c; margin: 6px 0; }
        .ctb-main { font-size: 22px; font-weight: bold; color: #1a1a2e; letter-spacing: 0.15em; margin: 8px 0; }
        .ctb-sub { font-size: 12px; color: #555; letter-spacing: 0.06em; }

        .cert-top { text-align: center; margin: 16px 0 20px; }
        .cert-serial { font-size: 11px; color: #94a3b8; margin-bottom: 8px; }
        .shuku-sym { font-size: 36px; margin: 8px 0; }
        .recipient-big { font-size: 22px; font-weight: bold; color: #1a1a2e; margin: 8px 0; }
        .birth-note { font-size: 12px; color: #64748b; margin-top: 4px; }

        .shuku-info-row {
            display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
            margin: 12px 0 20px;
        }
        .shuku-chip {
            padding: 6px 16px; border-radius: 20px; font-size: 12px;
            border: 1px solid #b8960c; color: #7c5a0a; background: rgba(184,150,12,0.08);
        }

        .section-divider {
            text-align: center; margin: 18px 0 12px;
            font-size: 11px; color: #b8960c; letter-spacing: 2px;
        }

        .message-block {
            background: rgba(250,248,240,0.8); border: 1px solid rgba(184,150,12,0.2);
            border-radius: 10px; padding: 16px 18px; margin-bottom: 16px;
        }
        .message-label {
            font-size: 11px; font-weight: bold; color: #b8960c;
            letter-spacing: 1.5px; margin-bottom: 10px; display: block;
        }
        .editable-block {
            font-size: 14px; line-height: 2.0; color: #1a1a2e;
            white-space: pre-wrap; outline: none; cursor: text;
            min-height: 40px;
        }
        .editable-block:focus { background: rgba(245,215,100,0.06); border-radius: 4px; }

        .zodiac-block {
            background: linear-gradient(135deg, rgba(240,248,255,0.95), rgba(225,240,255,0.9));
            border: 1.5px solid #7c9fd4; border-radius: 12px;
            padding: 18px 20px; margin-bottom: 16px;
        }
        .zodiac-sign-header {
            display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid rgba(124,159,212,0.3); padding-bottom: 10px; margin-bottom: 12px;
        }
        .zodiac-emoji { font-size: 22px; }
        .zodiac-sign-name { font-size: 16px; font-weight: bold; color: #1a3a6b; }
        .zodiac-theme-label { font-size: 12px; color: #4a72aa; background: rgba(124,159,212,0.15); padding: 3px 10px; border-radius: 20px; }
        .zodiac-keywords { list-style: none; padding: 0; margin: 0 0 12px; }
        .zodiac-keywords li {
            font-size: 13px; color: #2a4a7a; padding: 5px 0 5px 18px;
            border-bottom: 1px dashed rgba(124,159,212,0.2); position: relative;
        }
        .zodiac-keywords li::before { content: '✦'; position: absolute; left: 0; color: #7c9fd4; font-size: 10px; top: 7px; }
        .zodiac-message {
            font-size: 13px; color: #1a3a6b; font-style: italic;
            text-align: center; padding: 10px; background: rgba(124,159,212,0.1);
            border-radius: 8px; line-height: 1.8;
        }

        .moon-theme-block {
            background: linear-gradient(135deg, rgba(253,246,220,0.95), rgba(250,240,195,0.9));
            border: 1.5px solid #d4a017; border-radius: 12px;
            padding: 18px 20px; margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(212,160,23,0.15);
        }
        .moon-theme-label {
            font-size: 12px; font-weight: bold; color: #8a6200;
            letter-spacing: 2px; margin-bottom: 10px; display: block;
            text-align: center; border-bottom: 1px solid rgba(212,160,23,0.35); padding-bottom: 8px;
        }

        .sig-section {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-top: 24px; padding-top: 16px; border-top: 1px solid #ddd;
        }
        .sig-kanon { font-family: "Dancing Script", cursive; font-size: 28px; color: #1a1a2e; }
        .sig-right { text-align: right; font-size: 12px; color: #64748b; line-height: 1.8; }
        .sig-line { display: block; width: 120px; border-bottom: 1px solid #aaa; margin-left: auto; margin-top: 4px; }

        /* 印刷ボタン類 */
        .print-actions { display: flex; gap: 10px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
        .btn-print {
            background: #059669; color: #fff; border: none; border-radius: 8px;
            padding: 12px 28px; font-size: 14px; cursor: pointer;
            font-family: "Noto Serif JP", serif;
        }
        .btn-print:hover { opacity: 0.85; }
        .btn-reset {
            background: transparent; border: 1px solid #7c3aed; color: #c4b5fd;
            border-radius: 8px; padding: 12px 20px; font-size: 13px; cursor: pointer;
            font-family: "Noto Serif JP", serif; display: none;
        }
        .btn-reset:hover { background: rgba(124,58,237,0.15); }
        .btn-send-email {
            background: rgba(245,217,122,0.15); border: 1px solid #f5d97a; color: #f5d97a;
            border-radius: 8px; padding: 12px 22px; font-size: 14px; cursor: pointer;
            font-family: "Noto Serif JP", serif; display: none; transition: all 0.2s;
        }
        .btn-send-email:hover:not(:disabled) { background: rgba(245,217,122,0.3); }
        .btn-send-email:disabled { opacity: 0.5; cursor: not-allowed; }
        .email-badge { font-size:11px; color:#f5d97a; text-align:center; margin-top:4px; min-height:16px; }

        .saved-badge {
            font-size: 11px; color: #4ade80; text-align: center;
            opacity: 0; transition: opacity 0.3s; margin-top: 4px;
        }

        /* 日記自動読み込みバッジ */
        .diary-load-badge {
            font-size:11px; color:#4ade80; margin-top:6px; min-height:16px; display:none;
        }

        /* 印刷スタイル */
        @media print {
            @page { size: A4 portrait; margin: 14mm 16mm; }
            html, body {
                background: #fff !important; color: #000 !important;
                padding: 0 !important; margin: 0 !important;
                -webkit-print-color-adjust: exact; print-color-adjust: exact;
            }
            #space-canvas, .moon, .no-print { display: none !important; }
            .main-container { padding: 0 !important; }
            #resultArea { display: block !important; }
            .back-btn, .print-actions, .diary-input-section, .api-settings-panel,
            .page-header, .search-wrap, #participantGrid, .stats-bar, .saved-badge { display: none !important; }
            .result-card {
                border: 2px double #555 !important; background: #fff !important;
                box-shadow: none !important; padding: 12mm 14mm !important;
                max-width: 100% !important; border-radius: 0 !important;
                margin: 0 !important; color: #000 !important;
            }
            .cert-title-banner, .ctb-event, .ctb-deco, .ctb-main, .ctb-sub,
            .recipient-big, .shuku-chip, .message-label, .message-block,
            .editable-block, .sig-section, .birth-note { color: #000 !important; }
            .message-block { background: #f9f7f0 !important; border: 1px solid #ddd !important; }
            .editable-block { font-size: 11pt !important; }
            .corner-ornament { border-color: #555 !important; }
        }
    </style>
</head>
<body>
<canvas id="space-canvas"></canvas>
<div class="moon"></div>

<!-- ━━ 参加者リスト ━━ -->
<div class="main-container no-print" id="listView">
    <div class="page-header">
        <h1>🌙 月読み日記 振り返り鑑定書 生成ツール</h1>
        <p class="subtitle">参加者の名前をクリックして、7日間の日記をもとに第二の鑑定書を作成できます</p>
    </div>

    <!-- GAS URL設定 -->
    <div class="api-settings-panel">
        <button class="api-settings-toggle" onclick="toggleApiSettings(this)">
            <span>⚙️ GAS設定（日記自動読み込み・メール送信）</span>
            <span class="toggle-arrow">▼</span>
        </button>
        <div class="api-settings-body" id="gasSettingsBody">
            <div id="gasUrlCurrent" style="font-size:12px;color:#a5b4fc;margin-bottom:10px;padding:8px 12px;background:rgba(0,0,0,0.25);border-radius:6px;display:none;"></div>
            <div class="api-key-row">
                <input type="text" class="api-key-input" id="gasUrlInput" placeholder="https://script.google.com/macros/s/…/exec" autocomplete="off" spellcheck="false">
                <button class="btn-save-key" onclick="saveGasUrl()">保存</button>
                <button class="btn-save-key" onclick="clearGasUrl()" style="background:rgba(239,68,68,0.2);border-color:#ef4444;color:#fca5a5;">削除</button>
            </div>
            <div class="api-key-note">GAS Web App の URL（デプロイ後に発行される /exec URL）を貼り付けてください。<br>設定すると参加者カードに日記データが自動で読み込まれます。</div>
            <div id="gasUrlStatus" style="font-size:11px;margin-top:6px;min-height:16px;"></div>
        </div>
    </div>

    <!-- 今月の新月テーマ設定 -->
    <div class="api-settings-panel" style="border-color:rgba(251,191,36,0.4);">
        <button class="api-settings-toggle" onclick="toggleApiSettings(this)" style="color:#fde68a;">
            <span>🌙 今月の新月テーマ &nbsp;<span id="moonThemeBadge" style="color:#fcd34d;font-size:12px;"></span></span>
            <span class="toggle-arrow">▼</span>
        </button>
        <div class="api-settings-body" id="moonThemeBody">
            <div style="font-size:12px;color:#fde68a;margin-bottom:10px;">鑑定書のAI生成に使われます。月が変わったらここを更新してください。</div>
            <div class="api-key-row" style="flex-wrap:wrap;gap:8px;align-items:center;">
                <input type="text" class="api-key-input" id="moonSignInput" placeholder="例：双子座" style="max-width:120px;border-color:rgba(251,191,36,0.5);">
                <span style="color:#fde68a;font-size:13px;">新月　＝　</span>
                <input type="text" class="api-key-input" id="moonThemeInput" placeholder="例：発信力・人脈運" style="flex:1;border-color:rgba(251,191,36,0.5);">
                <button class="btn-save-key" onclick="saveMoonTheme()" style="background:rgba(251,191,36,0.2);border-color:#fbbf24;color:#fde68a;">保存</button>
            </div>
            <div id="moonThemeStatus" style="font-size:11px;margin-top:6px;min-height:16px;color:#fde68a;"></div>
        </div>
    </div>

    <!-- AI設定 -->
    <div class="api-settings-panel">
        <button class="api-settings-toggle" onclick="toggleApiSettings(this)">
            <span>🤖 AI設定（Gemini APIキー・無料）</span>
            <span class="toggle-arrow">▼</span>
        </button>
        <div class="api-settings-body" id="apiSettingsBody">
            <div id="apiKeyCurrent" style="font-size:12px;color:#a5b4fc;margin-bottom:10px;padding:8px 12px;background:rgba(0,0,0,0.25);border-radius:6px;display:none;"></div>
            <div class="api-key-row">
                <input type="text" class="api-key-input" id="apiKeyInput" placeholder="Google AI Studio APIキー" autocomplete="off" spellcheck="false">
                <button class="btn-save-key" onclick="saveApiKey()">保存</button>
                <button class="btn-save-key" onclick="testApiKey()" style="background:rgba(74,108,247,0.3);border-color:#4a6cf7;color:#a5b4fc;">テスト</button>
                <button class="btn-save-key" onclick="clearApiKey()" style="background:rgba(239,68,68,0.2);border-color:#ef4444;color:#fca5a5;">削除</button>
            </div>
            <div class="api-key-note">🆓 Google AI Studio（aistudio.google.com）で無料APIキーを発行。</div>
            <div id="apiKeyStatus" style="font-size:11px;margin-top:6px;min-height:16px;"></div>
        </div>
    </div>

    <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="🔍 名前で検索..." oninput="filterCards()">
    </div>
    <div id="statsBar" class="stats-bar"></div>
    <div id="participantGrid"></div>
</div>

<!-- ━━ 鑑定書作成エリア ━━ -->
<div id="resultArea">
    <div class="main-container">
        <button class="back-btn no-print" onclick="backToList()">← 参加者一覧に戻る</button>

        <!-- 日記入力セクション -->
        <div class="diary-input-section no-print">
            <h3>📖 7日間の月読み日記</h3>
            <div class="diary-load-badge" id="diaryLoadBadge">✓ スプレッドシートから日記を自動読み込みしました</div>
            <textarea class="diary-textarea" id="diaryText"
                placeholder="GAS URLを設定すると自動で読み込まれます。または、スプレッドシートから7日間の日記をコピペしてください。

例：
Day1：今日の月の気づき…
Day2：今日感じたこと…
…"></textarea>
            <div class="diary-actions">
                <button class="btn-ai" id="aiBtn" onclick="generateReading()">🤖 AI振り返り鑑定を生成</button>
                <button class="btn-ai" onclick="clearDiary()" style="background:rgba(239,68,68,0.15);border-color:#ef4444;color:#fca5a5;">🗑 日記をクリア</button>
            </div>
            <div class="ai-status" id="aiStatus"></div>
        </div>

        <!-- 鑑定書出力 -->
        <div class="print-actions no-print">
            <button class="btn-print" onclick="printReading()">🖨️ 印刷・PDF保存</button>
            <button class="btn-send-email" id="sendEmailBtn" onclick="sendCertificateEmail()">📧 メールで送信</button>

const GEMINI_MODEL = 'gemini-2.5-flash';
const GEMINI_URL = key => `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;

const MOON_THEME = { sign: '双子座', theme: '発信力・人脈運' };

function setApiKeyStatus(msg, color) {
    const el = document.getElementById('apiKeyStatus');
    if (el) { el.textContent = msg; el.style.color = color || '#a5b4fc'; }
}

function saveApiKey() {
    const raw = document.getElementById('apiKeyInput').value.replace(/\s/g,'').trim();
    if (!raw) { setApiKeyStatus('⚠ キーを入力してください','#fbbf24'); return; }
    localStorage.setItem('gemini_api_key', raw);
    document.getElementById('apiKeyInput').value = '';
    setApiKeyStatus('✓ 保存しました（'+raw.length+'文字）','#4ade80');
    refreshApiKeyDisplay();
    setTimeout(()=>setApiKeyStatus('',''), 4000);
}

function clearApiKey() {
    localStorage.removeItem('gemini_api_key');
    refreshApiKeyDisplay();
    setApiKeyStatus('削除しました','#94a3b8');
}

async function testApiKey() {
    const key = localStorage.getItem('gemini_api_key');
    if (!key) { setApiKeyStatus('⚠ キーが保存されていません','#fbbf24'); return; }
    setApiKeyStatus('⏳ テスト中…','#a5b4fc');
    try {
        const res = await fetch(GEMINI_URL(key), {
            method:'POST', headers:{'content-type':'application/json'},
            body: JSON.stringify({contents:[{parts:[{text:'こんにちは'}]}], generationConfig:{maxOutputTokens:10}})
        });
        if (!res.ok) {
            const err = await res.json().catch(()=>({}));
            const msg = err.error?.message || ('HTTP '+res.status);
            throw new Error(msg);
        }
        setApiKeyStatus('✓ 接続成功！APIキーは有効です','#4ade80');
    } catch(e) { setApiKeyStatus('❌ '+e.message,'#f87171'); }
}

function refreshApiKeyDisplay() {
    const key = localStorage.getItem('gemini_api_key');
    const el = document.getElementById('apiKeyCurrent');
    if (!el) return;
    if (key) { el.textContent = '保存済みキー: '+key.slice(0,8)+'…（'+key.length+'文字）'; el.style.display='block'; }
    else { el.style.display='none'; }
}

function toggleApiSettings(btn) {
    const body = btn.nextElementSibling;
    const open = body.style.display === 'block';
    body.style.display = open ? 'none' : 'block';
    btn.querySelector('.toggle-arrow').textContent = open ? '▼' : '▲';
    if (!open) {
        if (body.id === 'apiSettingsBody') refreshApiKeyDisplay();
        else if (body.id === 'moonThemeBody') refreshMoonThemeDisplay();
    }
}

let participants = [...BASE_PARTICIPANTS];
let currentIdx = null;
let participantEmail = null;

async function loadParticipantsFromGas() {
    const gasUrl = localStorage.getItem('gas_webhook_url');
    if (!gasUrl) return;
    try {
        const url = gasUrl + '?secretKey=tsukiyomi-2026-key&action=getParticipants';
        const res = await fetch(url);
        const data = await res.json();
        if (!data.ok || !data.participants.length) return;
        participants = data.participants.map(p => {
            const b = (p.birth || '').split('-');
            return {
                pid:    p.pid,
                name:   p.name,
                year:   b[0] ? parseInt(b[0]) : null,
                month:  b[1] ? parseInt(b[1]) : null,
                day:    b[2] ? parseInt(b[2]) : null,
                theme:  p.concern || '',
                email:  p.email,
                shuku:  p.shuku,
                hasDiaryOnSheet: p.hasDiary
            };
        });
        buildCards('');
    } catch(e) {
        console.log('GAS読み込みエラー（ローカルデータを使用）:', e);
    }
}

async function fetchParticipantData(idx) {
    const gasUrl = localStorage.getItem('gas_webhook_url');
    const p = participants[idx];
    if (!gasUrl || !p || !p.pid) return;
    try {
        const url = gasUrl + '?secretKey=tsukiyomi-2026-key&action=getParticipantData&pid=' + encodeURIComponent(p.pid);
        const res = await fetch(url);
        const data = await res.json();
        if (!data.ok) return;

        participantEmail = data.email || null;

        // メールアドレスが取れたらボタン表示
        const savedReading = localStorage.getItem(`diary_reading_${pKey(idx)}`);
        if (participantEmail && savedReading) {
            const btn = document.getElementById('sendEmailBtn');
            if (btn) btn.style.display = 'inline-flex';
        }

        // 日記テキストをスプレッドシートから組み立て
        const parts = [];
        if (data.newmoon) parts.push('【新月の願い】\n' + data.newmoon);
        for (let i = 1; i <= 7; i++) {
            if (data['day' + i]) parts.push('Day' + i + ':\n' + data['day' + i]);
        }
        if (parts.length === 0) return;

        const diaryEl = document.getElementById('diaryText');
        const savedDiary = localStorage.getItem(`diary_${pKey(idx)}`);
        if (!savedDiary || !savedDiary.trim()) {
            diaryEl.value = parts.join('\n\n');
            localStorage.setItem(`diary_${pKey(idx)}`, diaryEl.value);
            const badge = document.getElementById('diaryLoadBadge');
            if (badge) badge.style.display = 'block';
        }
    } catch(e) {
        console.log('参加者データ取得エラー:', e);
    }
}

async function sendCertificateEmail() {
    const gasUrl = localStorage.getItem('gas_webhook_url');
    if (!gasUrl) { alert('GAS URLを設定してください（上のGAS設定パネル）'); return; }
    if (!participantEmail) { alert('このページを開き直してもメールアドレスが取得できない場合は、GAS URLの設定を確認してください。'); return; }

    const p = participants[currentIdx];
    const shukuChar = getShuku(p.year, p.month, p.day);
    const item = shukuData.find(d => d.宿名 === shukuChar + '宿');

    const mainEl   = document.getElementById('mainMessageEl');
    const futureEl = document.getElementById('futureMessageEl');
    const section1 = mainEl   ? mainEl.innerText.trim()   : '';
    const section2 = futureEl ? futureEl.innerText.trim() : '';

    if (!section1 || section1.includes('AI振り返り鑑定を生成')) {
        alert('先にAI振り返り鑑定を生成してください。');
        return;
    }

    if (!confirm(`${p.name} 様（${participantEmail}）に鑑定書を送信しますか？`)) return;

    const btn = document.getElementById('sendEmailBtn');
    btn.disabled = true;
    btn.textContent = '📤 送信中…';
    document.getElementById('emailBadge').textContent = '';

    try {
        const res = await fetch(gasUrl, {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
                secretKey: 'tsukiyomi-2026-key',
                action: 'sendCertificate',
                email: participantEmail,
                name: p.name,
                shuku: item ? item.宿名 : '',
                section1: section1,
                section2: section2
            })
        });
        const data = await res.json();
        if (data.ok) {
            btn.textContent = '✓ 送信済み';
            btn.style.background = 'rgba(5,150,105,0.3)';
            btn.style.borderColor = '#059669';
            btn.style.color = '#6ee7b7';
            document.getElementById('emailBadge').textContent = '✓ ' + data.message;
        } else {
            throw new Error(data.error || '送信失敗');
        }
    } catch(e) {
        btn.disabled = false;
        btn.textContent = '📧 メールで送信';
        alert('エラー: ' + e.message + '\n\nCORSエラーの場合は、GASを「新しいバージョン」で再デプロイしてください。');
    }
}

        const hasDiary = !!localStorage.getItem(`diary_${pKey(origIdx)}`);

【共通ルール】

- 本人の日記の言葉を2〜3個、そのまま「　」で引用すること
- 日記に書かれていない具体的事実を勝手に作らないこと

- 段落間は1行空ける`;

    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 60000);
        let res;
        try {
            res = await fetch(GEMINI_URL(apiKey), {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { maxOutputTokens: 4096, temperature: 0.85 }
                }),
                signal: controller.signal
            });
        } finally { clearTimeout(timeoutId); }

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error?.message || `HTTP ${res.status}`);
        }

        const data = await res.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        const cleaned = text.replace(/[*#]+/g, '').trim();
        const [section1, rest] = cleaned.split('---SECTION2---');
        const [section2, section3] = (rest || '').split('---SECTION3---');

        const mainEl = document.getElementById('mainMessageEl');
        if (mainEl) mainEl.innerText = section1 ? section1.trim() : cleaned;

        const futureEl = document.getElementById('futureMessageEl');
        if (futureEl) futureEl.innerText = section2 ? section2.trim() : item.締め;

        const themeEl = document.getElementById('moonThemeMessageEl');
        if (themeEl) themeEl.innerText = section3 ? section3.trim() : '';

        autoSave();

        document.getElementById('resetReadingBtn').style.display = 'inline-flex';
        if (participantEmail) {
            const emailBtn = document.getElementById('sendEmailBtn');
            if (emailBtn) emailBtn.style.display = 'inline-flex';
        }
        statusEl.textContent = '✓ 振り返り鑑定メッセージを生成しました';
        setTimeout(() => { statusEl.textContent = ''; }, 4000);
    } catch(e) {
        const msg = e.name === 'AbortError' ? 'タイムアウト（60秒）。ネットワークまたはAPIキーを確認してください' : e.message;
        statusEl.textContent = '⚠ エラー: ' + msg;
    } finally {
        btn.disabled = false;
        btn.innerHTML = '🤖 AI振り返り鑑定を生成';
    }
}

(function () {
    const canvas = document.getElementById('space-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [], shooting = [];
    function resize() { W=canvas.width=window.innerWidth; H=canvas.height=Math.max(window.innerHeight,document.body.scrollHeight); }
    function mkStar() { return {x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.2,phase:Math.random()*Math.PI*2,speed:Math.random()*0.008+0.002,color:['#ffffff','#d0e8ff','#ffe8d0','#e0d0ff'][Math.floor(Math.random()*4)]}; }
    function mkShoot() { return {x:Math.random()*W*0.7,y:Math.random()*H*0.4,len:Math.random()*180+80,speed:Math.random()*14+8,alpha:1,angle:Math.PI/5+Math.random()*0.3}; }
    function init() { resize(); stars=Array.from({length:300},mkStar); }
    function draw() {
        ctx.clearRect(0,0,W,H);
        const now = performance.now()/1000;
        stars.forEach(s=>{const a=0.5+0.5*Math.sin(now*s.speed+s.phase);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.color;ctx.globalAlpha=a*0.85;ctx.fill();});
        ctx.globalAlpha=1;
        shooting=shooting.filter(s=>{s.alpha>0.02;s.x+=Math.cos(s.angle)*s.speed;s.y+=Math.sin(s.angle)*s.speed;s.alpha*=0.94;const grd=ctx.createLinearGradient(s.x,s.y,s.x-Math.cos(s.angle)*s.len,s.y-Math.sin(s.angle)*s.len);grd.addColorStop(0,`rgba(255,255,220,${s.alpha})`);grd.addColorStop(1,'rgba(255,255,220,0)');ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-Math.cos(s.angle)*s.len,s.y-Math.sin(s.angle)*s.len);ctx.strokeStyle=grd;ctx.lineWidth=1.5;ctx.stroke();return s.alpha>0.02;});
        if(Math.random()<0.005&&shooting.length<3)shooting.push(mkShoot());
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize',()=>{resize();stars=Array.from({length:300},mkStar);});
    init(); draw();
})();
