<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #06050f;
  min-height: 100vh;
  font-family: 'Shippori Mincho', serif;
  color: #f5f0e8;
  padding-bottom: 80px;
}
.hero {
  text-align: center;
  padding: 80px 24px 56px;
}
.hero-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 11px; letter-spacing: 0.5em;
  color: rgba(180,160,220,0.4);
  margin-bottom: 18px;
}
.hero-title {
  font-size: clamp(20px, 5vw, 32px);
  font-weight: 500; letter-spacing: 0.25em;
  color: #f5f0e8; margin-bottom: 10px;
}
.hero-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px; letter-spacing: 0.3em;
  color: rgba(180,160,220,0.6);
  margin-bottom: 28px;
}
.hero-line {
  width: 100px; height: 1px; margin: 0 auto;
  background: linear-gradient(to right, transparent, rgba(180,160,220,0.4), transparent);
}

/* パーソナルバナー */
#my-banner {
  display: none;
  max-width: 480px;
  margin: 0 auto 48px;
  padding: 0 24px;
  text-align: center;
}
.banner-inner {
  border: 1px solid rgba(255,210,100,0.3);
  border-radius: 16px;
  padding: 28px 24px 24px;
  background: radial-gradient(ellipse at 50% 0%, rgba(40,30,10,0.9) 0%, rgba(6,5,15,0.95) 100%);
  position: relative;
}
.banner-greeting {
  font-size: 11px; letter-spacing: 0.4em;
  color: rgba(255,210,100,0.5);
  margin-bottom: 10px;
}
.banner-gem { font-size: 36px; margin: 4px 0 8px; }
.banner-shuku-name {
  font-size: 22px; font-weight: 500; letter-spacing: 0.2em;
  color: #fff;
  margin-bottom: 2px;
}
.banner-crystal-name {
  font-size: 14px; letter-spacing: 0.2em;
  color: rgba(255,210,100,0.85);
  text-shadow: 0 0 12px rgba(255,210,100,0.4);
  margin-bottom: 12px;
}
.banner-seiju {
  display: inline-block;
  font-size: 11px; letter-spacing: 0.2em;
  color: rgba(180,160,220,0.7);
  border: 1px solid rgba(180,160,220,0.2);
  border-radius: 20px;
  padding: 4px 14px;
  margin-bottom: 14px;
}
.banner-affirm {
  font-size: 11px; line-height: 2;
  color: rgba(245,240,255,0.45);
  letter-spacing: 0.05em;
}
.banner-hint {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 10px; letter-spacing: 0.3em;
  color: rgba(255,210,100,0.3);
  margin-top: 14px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
}

.card-wrap {
  position: relative;
  width: 100%;
  padding-bottom: 173.4%;
  cursor: pointer;
  transition: opacity 0.5s;
}
/* 他のカードを少し暗くする（自分のカードがある時） */
.has-my-card .card-wrap:not(.my-card) {
  opacity: 0.55;
}
.has-my-card .card-wrap:not(.my-card):hover {
  opacity: 1;
}

.card-inner {
  position: absolute; inset: 0;
  transform-style: preserve-3d;
  transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
}
.card-wrap.flipped .card-inner { transform: rotateY(180deg); }

.face {
  position: absolute; inset: 0;
  border-radius: 14px; overflow: hidden;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  box-shadow: 0 0 0 1px rgba(180,160,220,0.25), 0 20px 60px rgba(0,0,0,0.65);
  transition: box-shadow 0.4s;
}
.card-wrap:hover .face {
  box-shadow: 0 0 0 1px rgba(180,160,220,0.5), 0 0 28px rgba(180,160,220,0.1), 0 28px 80px rgba(0,0,0,0.7);
}
/* 自分のカードのゴールドグロー */
.my-card .face {
  box-shadow:
    0 0 0 2px rgba(255,210,100,0.7),
    0 0 30px rgba(255,210,100,0.25),
    0 0 60px rgba(255,210,100,0.1),
    0 20px 60px rgba(0,0,0,0.65) !important;
}
.my-card-badge {
  position: absolute; top: 10px; right: 10px; z-index: 10;
  font-size: 8px; letter-spacing: 0.15em;
  color: rgba(255,210,100,0.95);
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(255,210,100,0.4);
  border-radius: 10px;
  padding: 3px 8px;
  backdrop-filter: blur(4px);
}

/* 聖獣バッジ */
.seiju-badge {
  position: absolute; top: 10px; left: 32px; z-index: 10;
  font-size: 9px;
  opacity: 0.7;
}

/* 表面 */
.front { background-size: cover; background-position: center; }
.front .grad-top {
  position: absolute; top:0; left:0; right:0; height: 70px;
  background: linear-gradient(to bottom, rgba(3,1,14,0.82) 0%, transparent 100%);
}
.front .grad-bot {
  position: absolute; bottom:0; left:0; right:0; height: 155px;
  background: linear-gradient(to top, rgba(3,1,14,0.97) 0%, rgba(3,1,14,0.7) 45%, transparent 100%);
}
.front .corner {
  position: absolute; width: 14px; height: 14px;
  border-color: rgba(180,160,220,0.6); border-style: solid;
}
.front .corner.tl { top:10px; left:10px; border-width:1px 0 0 1px; }
.front .corner.tr { top:10px; right:10px; border-width:1px 1px 0 0; }
.front .corner.bl { bottom:10px; left:10px; border-width:0 0 1px 1px; }
.front .corner.br { bottom:10px; right:10px; border-width:0 1px 1px 0; }
.front .num {
  position: absolute; top:12px; left:14px;
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 9px; letter-spacing: 0.25em;
  color: rgba(180,160,220,0.75);
}
.front .bottom-info {
  position: absolute; bottom:0; left:0; right:0;
  padding: 0 12px 12px; text-align: center;
}
.front .shuku {
  font-size: 18px; font-weight: 500; letter-spacing: 0.18em;
  color: #ffffff;
  text-shadow: 0 0 20px rgba(180,160,220,0.5), 0 2px 6px rgba(0,0,0,0.9);
  margin-bottom: 3px;
}
.front .shuku-en {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 7.5px; letter-spacing: 0.15em;
  color: rgba(180,160,220,0.75); margin-bottom: 8px;
}
.front .divider {
  width: 40px; height: 1px; margin: 0 auto 8px;
  background: linear-gradient(to right, transparent, rgba(180,160,220,0.55), transparent);
}
.front .crystal {
  font-size: 11px; letter-spacing: 0.15em;
  color: rgba(245,240,255,0.9);
  text-shadow: 0 0 10px rgba(180,160,220,0.5);
}

/* 裏面 */
.back {
  transform: rotateY(180deg);
  background:
    radial-gradient(ellipse 120% 60% at 50% 0%, rgba(30,12,60,1) 0%, transparent 60%),
    linear-gradient(155deg, #130828 0%, #08051a 50%, #100a25 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 16px; gap: 6px;
}
.back::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(circle 1px at 22% 18%, rgba(180,160,220,0.18) 0%, transparent 100%),
    radial-gradient(circle 1px at 76% 14%, rgba(180,160,220,0.14) 0%, transparent 100%),
    radial-gradient(circle 1.5px at 55% 35%, rgba(180,160,220,0.2) 0%, transparent 100%),
    radial-gradient(circle 1px at 18% 65%, rgba(180,160,220,0.12) 0%, transparent 100%),
    radial-gradient(circle 1px at 80% 58%, rgba(180,160,220,0.15) 0%, transparent 100%),
    radial-gradient(circle 1px at 40% 80%, rgba(180,160,220,0.12) 0%, transparent 100%);
  pointer-events: none;
}
.back .bc { position: absolute; width:14px; height:14px; border-color: rgba(180,160,220,0.4); border-style:solid; }
.back .bc.tl { top:10px; left:10px; border-width:1px 0 0 1px; }
.back .bc.tr { top:10px; right:10px; border-width:1px 1px 0 0; }
.back .bc.bl { bottom:10px; left:10px; border-width:0 0 1px 1px; }
.back .bc.br { bottom:10px; right:10px; border-width:0 1px 1px 0; }
.back .b-num {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 9px; letter-spacing: 0.35em;
  color: rgba(180,160,220,0.4); position: relative; z-index:1;
}
.back .b-gem { font-size: 24px; position: relative; z-index:1; margin: 2px 0; }
.back .b-line {
  width: 36px; height: 1px; position: relative; z-index:1;
  background: linear-gradient(to right, transparent, rgba(180,160,220,0.45), transparent);
}
.back .b-brand {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 7px; letter-spacing: 0.3em;
  color: rgba(180,160,220,0.3); text-align: center;
  position: relative; z-index:1;

.back .b-shuku {
  font-size: 15px; font-weight: 500; letter-spacing: 0.2em;
  color: rgba(245,240,255,0.88); position: relative; z-index:1; margin-top: 4px;

.back .b-crystal-label {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 7.5px; letter-spacing: 0.3em;
  color: rgba(180,160,220,0.4); position: relative; z-index:1; margin-top: 2px;
}
.back .b-crystal {
  font-size: 12px; letter-spacing: 0.18em;
  color: rgba(180,160,220,0.85);
  text-shadow: 0 0 12px rgba(180,160,220,0.4);
  position: relative; z-index:1;
}

.footer {
  text-align: center; padding: 56px 24px 0;
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 11px; letter-spacing: 0.4em;
  color: rgba(180,160,220,0.2);
}

@media (max-width: 480px) {
  .gallery { grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 12px; }
}
</style>
</head>

  var max = 0, dominant = '火';
  var pairs = attr.match(/[火土風水]\d/g) || [];
  pairs.forEach(function(p) {
    var n = parseInt(p[1]);
    if (n > max) { max = n; dominant = p[0]; }

    if (m) dominant = m[0];

  { num:'27', shuku:'胃宿', en:'The Treasure',     crystal:'イエロートパーズ',      attr:'火4',     gem:'💛', img:'i_胃宿_文字修正版_v4_黒部分調整.png',
    affirm:'私は今ある豊かさを味わい、満足の力でさらに運を広げます。',
    action:'小物入れを整理し、大切なものを一つ選んで「守ってくれてありがとう」と感謝する。' },
];

// URL パラメータ解析
var params = new URLSearchParams(location.search);
var pidParam = params.get('pid');
var shukuParam = params.get('shuku');
var myShuku = shukuParam;
var myName = '';

if (pidParam && window.PARTICIPANTS_DATA) {
  var pidKey = String(pidParam).padStart(3, '0');
  var participant = window.PARTICIPANTS_DATA[pidKey];
  if (participant) {
    myShuku = participant.shuku;
    myName = participant.name;
  }
}

// 自分のカードデータを探す
var myCardData = null;
if (myShuku) {
  for (var ci = 0; ci < cards.length; ci++) {
    if (cards[ci].shuku === myShuku) { myCardData = cards[ci]; break; }
  }
}

// パーソナルバナーを描画
if (myCardData) {
  var el = getDominantElement(myCardData.attr);
  var sj = SEIJU[el] || SEIJU['火'];
  var greeting = myName ? myName + 'さんの守護クリスタル' : 'あなたの守護クリスタル';
  document.getElementById('my-banner').style.display = 'block';
  document.getElementById('my-banner').innerHTML =
    '<div class="banner-inner">' +
      '<p class="banner-greeting">' + greeting + '</p>' +
      '<div class="banner-gem">' + myCardData.gem + '</div>' +
      '<div class="banner-shuku-name">' + myCardData.shuku + '</div>' +
      '<div class="banner-crystal-name">' + myCardData.crystal + '</div>' +
      '<div class="banner-seiju">' + sj.emoji + '&nbsp;' + sj.name + '&nbsp;— ' + sj.desc + '</div>' +
      '<div class="banner-affirm">' + myCardData.affirm + '</div>' +
      '<p class="banner-hint">↓ カードをタップして詳しく見る</p>' +
    '</div>';
}

// ギャラリー描画
var gallery = document.getElementById('gallery');
if (myCardData) gallery.classList.add('has-my-card');

var myCardEl = null;
cards.forEach(function(c, i) {
  var el = getDominantElement(c.attr);
  var sj = SEIJU[el] || SEIJU['火'];
  var isMyCard = myShuku && c.shuku === myShuku;

  var wrap = document.createElement('div');
  wrap.className = 'card-wrap' + (isMyCard ? ' my-card' : '');
  wrap.style.transitionDelay = (i % 9) * 50 + 'ms';
  wrap.onclick = function() { wrap.classList.toggle('flipped'); };

  var bgStyle = c.img
    ? "background-image:url('" + BASE + c.img + "')"
    : "background: radial-gradient(circle at 40% 35%, rgba(180,160,220,0.12), rgba(10,6,30,0.98))";

  var myBadge = isMyCard ? '<div class="my-card-badge">✦ あなたの宿</div>' : '';

  wrap.innerHTML =
    '<div class="card-inner">' +
      '<div class="face front" style="' + bgStyle + '">' +
        '<div class="grad-top"></div>' +
        '<div class="grad-bot"></div>' +
        '<div class="corner tl"></div><div class="corner tr"></div>' +
        '<div class="corner bl"></div><div class="corner br"></div>' +
        '<div class="num">No. ' + c.num + '</div>' +
        '<div class="seiju-badge">' + sj.emoji + '</div>' +
        myBadge +
        '<div class="bottom-info">' +
          '<div class="shuku">' + c.shuku + '</div>' +
          '<div class="shuku-en">' + c.en + '</div>' +
          '<div class="divider"></div>' +
          '<div class="crystal">' + c.crystal + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="face back">' +
        '<div class="bc tl"></div><div class="bc tr"></div>' +
        '<div class="bc bl"></div><div class="bc br"></div>' +
        '<div class="b-num">No. ' + c.num + ' / 27</div>' +
        '<div class="b-gem">' + c.gem + '</div>' +
        '<div class="b-line"></div>' +
        '<div class="b-brand">Crystal Oracle Series</div>' +
        '<div class="b-shuku">' + c.shuku + '</div>' +
        '<div class="b-crystal-label">クリスタル</div>' +
        '<div class="b-crystal">' + c.crystal + '</div>' +
        '<div class="b-crystal-label" style="margin-top:5px">属性元素</div>' +
        '<div class="b-crystal" style="font-size:10px;color:rgba(180,160,220,0.65)">' + c.attr + '</div>' +
        '<div style="width:36px;height:1px;background:linear-gradient(to right,transparent,rgba(180,160,220,0.3),transparent);margin:6px auto"></div>' +
        '<div style="font-size:8.5px;letter-spacing:0.03em;line-height:1.75;color:rgba(245,240,255,0.38);text-align:center;padding:0 4px;position:relative;z-index:1">' + c.affirm + '</div>' +
      '</div>' +
    '</div>';

  gallery.appendChild(wrap);
  if (isMyCard) myCardEl = wrap;
});

// 自分のカードへスクロール＆自動フリップ
if (myCardEl) {
  setTimeout(function() {
    myCardEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(function() { myCardEl.classList.add('flipped'); }, 600);
  }, 500);
}
</script>
</body>
</html>
