<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>月サイクル日記</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1025">
  <link rel="apple-touch-icon" href="images/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0a1a; --border: rgba(241,217,155,.22);
      --gold: #f1d99b; --gold2: #c8a84b; --white: #f5f0e8; --muted: rgba(245,240,232,.55);
      --radius: 18px;
    }
    body { background: var(--bg); color: var(--white); font-family: 'Hiragino Mincho ProN', 'Georgia', serif; min-height: 100vh; }
    .shell { width: min(660px, calc(100% - 32px)); margin: 0 auto; padding: 36px 0 100px; }

    /* ─ モード切り替えタブ ─ */
    .mode-tabs { display: flex; gap: 0; margin-bottom: 28px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .mode-tab {
      flex: 1; padding: 12px 8px; text-align: center; font-size: 13px;
      background: none; color: var(--muted); border: none; cursor: pointer;
      font-family: inherit; transition: all .2s; letter-spacing: .04em;
    }
    .mode-tab.is-active { background: rgba(241,217,155,.12); color: var(--gold); }
    .mode-tab + .mode-tab { border-left: 1px solid var(--border); }

    /* ─ フェーズヘッダー ─ */
    .phase-hero {
      text-align: center; margin-bottom: 24px; padding: 26px 18px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: linear-gradient(160deg, rgba(241,217,155,.09), rgba(155,142,196,.06));
    }
    .ph-icon { font-size: 44px; display: block; margin-bottom: 8px; }
    .ph-name { font-size: clamp(18px, 4vw, 24px); color: var(--gold); letter-spacing: .08em; }
    .ph-theme { margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .ph-shuku { margin-top: 8px; font-size: 12px; color: var(--gold2); letter-spacing: .12em; }

    /* ─ 7日間進捗ドット ─ */
    .day-dots { display: flex; gap: 8px; justify-content: center; margin: 18px 0 22px; flex-wrap: wrap; }
    .day-dot {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border); background: rgba(255,255,255,.04);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--muted); cursor: pointer; transition: all .2s;
      text-decoration: none;
    }
    .day-dot:hover { border-color: var(--gold2); color: var(--gold); }
    .day-dot.is-done { background: rgba(125,187,138,.25); border-color: rgba(125,187,138,.6); color: #a8e0a8; }
    .day-dot.is-today { background: rgba(200,168,75,.25); border-color: var(--gold2); color: var(--gold); font-weight: bold; }

    /* ─ セクションタイトル ─ */
    .sec-title { font-size: 11px; color: var(--gold2); letter-spacing: .22em; margin-bottom: 12px; padding-bottom: 7px; border-bottom: 1px solid var(--border); }

    /* ─ 開運アイテム（コンパクト版）─ */
    .kaiun-strip { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 4px; }
    .kaiun-chip {
      flex-shrink: 0; padding: 8px 12px; border: 1px solid var(--border); border-radius: 999px;
      font-size: 12px; color: var(--white); background: rgba(241,217,155,.04);
      white-space: nowrap;
    }
    .kaiun-chip span { color: var(--gold2); margin-right: 4px; }

    /* ─ 今日のプロンプト ─ */
    .today-prompt { margin-bottom: 18px; }
    .tp-day { font-size: 11px; color: var(--gold2); letter-spacing: .2em; margin-bottom: 6px; }
    .tp-q { font-size: 16px; color: var(--gold); line-height: 1.7; }

    /* ─ テキストエリア ─ */
    textarea.diary-input {
      width: 100%; padding: 16px; background: rgba(255,255,255,.04);
      border: 1px solid var(--border); border-radius: 14px;
      color: var(--white); font-family: inherit; font-size: 15px; line-height: 2;
      resize: vertical; min-height: 160px; outline: none; transition: border-color .2s;
    }
    textarea.diary-input:focus { border-color: var(--gold2); background: rgba(241,217,155,.04); }
    textarea.diary-input::placeholder { color: rgba(245,240,232,.28); }

    /* ─ 占的インプット ─ */
    .intention-box { margin-bottom: 24px; }
    .intention-label { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 10px; }
    .intention-display {
      padding: 14px 16px; border: 1px solid rgba(241,217,155,.3); border-radius: 12px;
      background: rgba(241,217,155,.06); font-size: 15px; color: var(--gold); line-height: 1.8;
    }

    /* ─ 振り返り4問 ─ */
    .reflection-questions { display: grid; gap: 18px; }
    .rq-block .rq-num { font-size: 11px; color: var(--gold2); letter-spacing: .2em; margin-bottom: 5px; }
    .rq-block .rq-text { font-size: 14px; color: var(--gold); line-height: 1.7; margin-bottom: 9px; }

    /* ─ 保存ボタン ─ */
    .save-area { text-align: center; margin: 20px 0 16px; }
    .btn-save {
      padding: 14px 48px; background: var(--gold2); color: #1a1025;
      border: none; border-radius: 999px; font-size: 15px; font-family: inherit;
      font-weight: bold; cursor: pointer; letter-spacing: .06em;
    }
    .btn-save:hover { background: var(--gold); }
    .save-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

    /* ─ 振り返り鑑定書ボタン ─ */
    .report-link-area { text-align: center; margin-bottom: 28px; display: none; }
    .btn-report {
      padding: 11px 28px; border: 1px solid var(--gold2); background: none;
      color: var(--gold); border-radius: 999px; font-size: 13px;
      font-family: inherit; cursor: pointer; letter-spacing: .06em;
    }
    .btn-report:hover { background: rgba(241,217,155,.08); }

    /* ─ 保存済み表示 ─ */
    .saved-tag { display: none; text-align: center; margin-bottom: 14px; font-size: 12px; color: #a8e0a8; }

    /* ─ トースト ─ */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #1e3d1e; color: #a8e0a8; padding: 11px 26px; border-radius: 999px;
      font-size: 13px; display: none; z-index: 200; white-space: nowrap;
    }
    .toast.show { display: block; animation: fadeOut 3s ease forwards; }
    @keyframes fadeOut {
      0%{ opacity:0; transform:translateX(-50%) translateY(6px); }
      12%{ opacity:1; transform:translateX(-50%) translateY(0); }
      75%{ opacity:1; }
      100%{ opacity:0; }
    }

    /* ─ ナビ ─ */
    .nav-links { display: flex; justify-content: space-between; margin-top: 36px; }
    .nav-links a { color: var(--muted); font-size: 13px; text-decoration: none; }
    .nav-links a:hover { color: var(--gold); }
  </style>
</head>
<body>
<div class="shell">

  <!-- モード切り替えタブ -->
  <div class="mode-tabs">
    <button class="mode-tab is-active" id="tabDaily" onclick="switchMode('daily')">🌙 毎日の日記</button>
    <button class="mode-tab" id="tabReflect" onclick="switchMode('reflect')">✦ フェーズ振り返り</button>
  </div>

  <!-- フェーズヘッダー -->
  <div class="phase-hero">
    <span class="ph-icon" id="phIcon">🌑</span>
    <div class="ph-name" id="phName">—</div>
    <div class="ph-theme" id="phTheme"></div>
    <div class="ph-shuku" id="phShuku"></div>
  </div>

  <!-- 7日間進捗ドット -->
  <div class="day-dots" id="dayDots"></div>

  <!-- ─────────── 毎日モード ─────────── -->
  <div id="panelDaily">

    <p class="sec-title">✦ 今日の開運アイテム</p>
    <div class="kaiun-strip" id="kaiun-strip-items"></div>

    <div class="today-prompt">
      <p class="tp-day" id="tpDay">Day —</p>
      <p class="tp-q" id="tpQ"></p>
    </div>

    <textarea class="diary-input" id="dailyInput" placeholder="今日感じたこと、気づいたこと、ふと浮かんだ言葉を…"></textarea>

    <div class="save-area">
      <button class="btn-save" onclick="saveDaily()">今日の日記を保存</button>
      <p class="save-hint">毎日短くでも大丈夫。書き続けることが鑑定書になります。</p>
    </div>

    <div class="saved-tag" id="dailySavedTag">✓ 今日の日記は保存済みです</div>

    <div class="report-link-area" id="dailyReportArea">
      <button class="btn-report" onclick="goReport()">🔮 振り返り鑑定書を見る</button>
    </div>
  </div>

  <!-- ─────────── 振り返りモード ─────────── -->
  <div id="panelReflect" style="display:none;">

    <!-- 占的（新月のみ入力、他は表示） -->
    <p class="sec-title">✦ 今月の占的（願いのテーマ）</p>
    <div class="intention-box" id="intentionBox"></div>

    <p class="sec-title">✦ フェーズ振り返り（4問）</p>
    <div class="reflection-questions" id="reflectQuestions"></div>

    <div class="save-area">
      <button class="btn-save" onclick="saveReflect()">振り返りを保存</button>
      <p class="save-hint">保存後、AI月読みコーチングが利用できます。</p>
    </div>

    <div class="saved-tag" id="reflectSavedTag">✓ 振り返りは保存済みです</div>

    <div class="report-link-area" id="reflectReportArea">
      <button class="btn-report" onclick="goReport()">🔮 振り返り鑑定書を見る</button>
    </div>
  </div>

  <div class="nav-links">
    <a href="moon_cycle_dashboard.html">← 月サイクル一覧へ</a>
    <a href="moon_treasure.html">🗝️ 月の宝箱</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="moon_cycle_data.js"></script>
<script src="moon_points.js"></script>
<script src="diary_data_sync.js"></script>
<script>
var CYCLE_ID, PHASE_KEY, CYCLE, PD, META, USER_ID;
var CURRENT_DAY = 1; // 1-7 within this phase

function init() {
  var params = new URLSearchParams(location.search);
  CYCLE_ID  = params.get('cycle') || '';
  PHASE_KEY = params.get('phase') || '';
  var dayParam = parseInt(params.get('day') || '0', 10);

  CYCLE = MOON_CYCLE_DATA.cycles.find(function(c){ return c.id === CYCLE_ID; });
  if (!CYCLE || !CYCLE[PHASE_KEY]) {
    var info = getCurrentPhaseInfo();
    CYCLE_ID = info.cycleId; PHASE_KEY = info.phase; CYCLE = info.cycle;
  }
  PD   = CYCLE[PHASE_KEY];
  META = PHASE_META[PHASE_KEY];

  var profile = (function(){
    try { return JSON.parse(localStorage.getItem('tsukiyomi:diarySync:cachedProfile')||'{}'); }
    catch(e){ return {}; }
  })();
  USER_ID = profile.email || profile.participantId || '';

  // 今フェーズの何日目か計算
  CURRENT_DAY = dayParam > 0 ? Math.min(dayParam, 7) : calcCurrentDay();

  renderHeader(profile);
  renderDots();
  renderKaiun();
  renderDailyPrompt();
  loadDailyEntry();
  renderIntention();
  renderReflectQuestions();
  loadReflectEntry();
}

function renderHeader(profile) {
  document.getElementById('phIcon').textContent = META.icon;
  document.getElementById('phName').textContent =
    META.ja + (PD.zodiac ? '（' + PD.zodiac + '）' : '') +
    '　' + CYCLE_ID.replace('-','年') + '月';
  document.getElementById('phTheme').textContent = PD.theme;
  if (profile.shuku) {
    document.getElementById('phShuku').textContent = '✦ あなたの宿曜: ' + profile.shuku;
  }
}

function calcCurrentDay() {
  var start = new Date(PD.date + 'T00:00:00');
  var today = new Date();
  today.setHours(0,0,0,0);
  var diff = Math.floor((today - start) / 86400000) + 1;
  return Math.max(1, Math.min(diff, 7));
}

function dailyKey(day) {
  return 'tsukiyomi:moonCycle:daily:v1:' + USER_ID + ':' + CYCLE_ID + ':' + PHASE_KEY + ':' + day;
}

function renderDots() {
  var container = document.getElementById('dayDots');
  container.innerHTML = '';
  for (var d = 1; d <= 7; d++) {
    var saved = false;
    if (USER_ID) {
      try { saved = !!localStorage.getItem(dailyKey(d)); } catch(e){}
    }
    var isToday = (d === CURRENT_DAY);
    var link = document.createElement('a');
    link.href = 'moon_cycle_diary.html?cycle=' + CYCLE_ID + '&phase=' + PHASE_KEY + '&day=' + d;
    link.className = 'day-dot' + (saved ? ' is-done' : '') + (isToday ? ' is-today' : '');
    link.textContent = saved ? '✓' : d;
    link.title = d + '日目';
    container.appendChild(link);
  }
}

function renderKaiun() {
  var strip = document.getElementById('kaiun-strip-items');
  strip.innerHTML = '';
  var items = PD.kaiun || [];
  items.forEach(function(k) {
    var chip = document.createElement('div');
    chip.className = 'kaiun-chip';
    chip.innerHTML = '<span>' + k.emoji + '</span>' + k.item;
    chip.title = k.reason;
    strip.appendChild(chip);
  });
}

function renderDailyPrompt() {
  document.getElementById('tpDay').textContent = 'Day ' + CURRENT_DAY + ' / 7';
  // 日ごとに質問をローテーション（4問を7日でループ）
  var qIdx = (CURRENT_DAY - 1) % (PD.questions ? PD.questions.length : 1);
  var q = PD.questions ? PD.questions[qIdx] : '今日の気持ちを書いてください。';
  document.getElementById('tpQ').textContent = q;
}

function loadDailyEntry() {
  if (!USER_ID) return;
  try {
    var saved = JSON.parse(localStorage.getItem(dailyKey(CURRENT_DAY)) || 'null');
    if (!saved) return;
    document.getElementById('dailyInput').value = saved.text || '';
    document.getElementById('dailySavedTag').style.display = 'block';
    document.getElementById('dailyReportArea').style.display = 'block';
  } catch(e) {}
}

function saveDaily() {
  var text = document.getElementById('dailyInput').value;
  var isNew = false;
  if (USER_ID) {
    isNew = !localStorage.getItem(dailyKey(CURRENT_DAY));
    var data = {
      day: CURRENT_DAY, cycleId: CYCLE_ID, phase: PHASE_KEY,
      savedAt: new Date().toISOString(), text: text,
      question: document.getElementById('tpQ').textContent
    };
    try { localStorage.setItem(dailyKey(CURRENT_DAY), JSON.stringify(data)); } catch(e){}
  }

  // ポイント付与（新規保存のみ）
  if (isNew && USER_ID) {
    recordDailyStreak(USER_ID);
    var r = addMoonPoints(USER_ID, MOON_POINT_VALUES.daily_entry, 'Day' + CURRENT_DAY + '日記');
    var msg = '✓ Day ' + CURRENT_DAY + ' 保存 ＋' + MOON_POINT_VALUES.daily_entry + ' 🌙';

    // 7日コンプリートチェック
    var doneCount = 0;
    for (var d = 1; d <= 7; d++) {
      try { if (localStorage.getItem(dailyKey(d))) doneCount++; } catch(e){}
    }
    if (doneCount === 7) {
      var phaseResult = onPhaseComplete(USER_ID, CYCLE_ID, PHASE_KEY);
      if (phaseResult.points > 0) {
        msg = '🎉 7日コンプリート！ ＋' + (MOON_POINT_VALUES.daily_entry + phaseResult.points) + ' 🌙';
        if (phaseResult.messages.length) {
          setTimeout(function(){ showToast(phaseResult.messages[0]); }, 2000);
        }
      }
    }
    showToast(msg);
  } else {
    showToast('✓ Day ' + CURRENT_DAY + ' の日記を更新しました');
  }

  document.getElementById('dailySavedTag').style.display = 'block';
  document.getElementById('dailyReportArea').style.display = 'block';
  renderDots();
}

function renderIntention() {
  var box = document.getElementById('intentionBox');
  var intentionKey = 'tsukiyomi:moonCycle:intention:' + USER_ID + ':' + CYCLE_ID;

  if (PHASE_KEY === 'shingetu') {
    var saved = '';
    try { saved = localStorage.getItem(intentionKey) || ''; } catch(e){}
    box.innerHTML =
      '<p class="intention-label">今月、月のサイクルで叶えたい願い・テーマを書いてください。<br>これがこのサイクルの「占的」になります。</p>' +
      '<textarea class="diary-input" id="intentionInput" style="min-height:80px" placeholder="例：自分らしく表現できるようになりたい">' +
      escHtml(saved) + '</textarea>';
  } else {
    var intention = '';
    try { intention = localStorage.getItem(intentionKey) || ''; } catch(e){}
    box.innerHTML = intention
      ? '<div class="intention-display">' + escHtml(intention) + '</div>'
      : '<div class="intention-display" style="color:var(--muted);font-style:italic;">新月フェーズで願いのテーマを書いておくと、ここに表示されます。</div>';
  }
}

function renderReflectQuestions() {
  var container = document.getElementById('reflectQuestions');
  container.innerHTML = '';
  (PD.questions || []).forEach(function(q, i) {
    var div = document.createElement('div');
    div.className = 'rq-block';
    div.innerHTML =
      '<p class="rq-num">Q' + (i+1) + '</p>' +
      '<p class="rq-text">' + escHtml(q) + '</p>' +
      '<textarea class="diary-input" id="rq' + i + '" style="min-height:100px" placeholder="思ったことをそのまま…"></textarea>';
    container.appendChild(div);
  });
}

function loadReflectEntry() {
  if (!USER_ID) return;
  var key = getMoonCycleKey(USER_ID, CYCLE_ID, PHASE_KEY);
  try {
    var saved = JSON.parse(localStorage.getItem(key) || 'null');
    if (!saved || !saved.lines) return;
    saved.lines.forEach(function(line, i) {
      var ta = document.getElementById('rq' + i);
      if (ta) ta.value = line.text || '';
    });
    document.getElementById('reflectSavedTag').style.display = 'block';
    document.getElementById('reflectReportArea').style.display = 'block';
  } catch(e) {}
}

function saveReflect() {
  var lines = (PD.questions || []).map(function(q, i) {
    var ta = document.getElementById('rq' + i);
    return { question: q, text: ta ? ta.value : '' };
  });
  var data = { cycleId: CYCLE_ID, phase: PHASE_KEY, savedAt: new Date().toISOString(), lines: lines };

  if (PHASE_KEY === 'shingetu') {
    var ii = document.getElementById('intentionInput');
    if (ii && USER_ID) {
      var ik = 'tsukiyomi:moonCycle:intention:' + USER_ID + ':' + CYCLE_ID;
      try { localStorage.setItem(ik, ii.value); } catch(e){}
      data.intention = ii.value;
    }
  }

  if (USER_ID) {
    try { localStorage.setItem(getMoonCycleKey(USER_ID, CYCLE_ID, PHASE_KEY), JSON.stringify(data)); } catch(e){}
    var rr = onReflectComplete(USER_ID, CYCLE_ID, PHASE_KEY);
    if (rr.points > 0) {
      showToast('✓ 振り返り保存 ＋' + rr.points + ' 🌙');
    } else {
      showToast('✓ 振り返りを保存しました');
    }
  } else {
    showToast('✓ 振り返りを保存しました');
  }
  document.getElementById('reflectSavedTag').style.display = 'block';
  document.getElementById('reflectReportArea').style.display = 'block';
}

function goReport() {
  location.href = 'moon_cycle_report.html?cycle=' + CYCLE_ID + '&phase=' + PHASE_KEY;
}

function switchMode(mode) {
  var isDaily = (mode === 'daily');
  document.getElementById('panelDaily').style.display   = isDaily ? '' : 'none';
  document.getElementById('panelReflect').style.display = isDaily ? 'none' : '';
  document.getElementById('tabDaily').classList.toggle('is-active', isDaily);
  document.getElementById('tabReflect').classList.toggle('is-active', !isDaily);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('show');
  void t.offsetWidth; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3200);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('DOMContentLoaded', init);
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() { navigator.serviceWorker.register("sw.js"); });
}
</script>
</body>
</html>
