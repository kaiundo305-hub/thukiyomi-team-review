<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>かのんからのアドバイス 復旧ページ</title>
  <style>
    :root{--bg1:#1b1233;--bg2:#3a235f;--gold:#d8b56d;--gold2:#f1d99b;--white:#fffaf2;--muted:#e5d9ef;--line:rgba(241,217,155,.45)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;color:var(--white);background:linear-gradient(145deg,var(--bg1),var(--bg2));line-height:1.8}
    main{max-width:920px;margin:auto;padding:32px 18px 64px}
    .panel{border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.09);padding:26px;box-shadow:0 18px 60px rgba(0,0,0,.25)}
    h1{margin:0 0 8px;color:var(--gold2);font-size:clamp(25px,5vw,38px);letter-spacing:.06em}
    .lead{margin:0 0 22px;color:var(--muted)}
    .notice{margin:18px 0;padding:14px 16px;border:1px solid rgba(241,217,155,.32);border-radius:16px;background:rgba(241,217,155,.08);font-size:14px;color:var(--muted)}
    .entry{margin:14px 0;padding:16px;border:1px solid rgba(241,217,155,.28);border-radius:18px;background:rgba(255,255,255,.06)}
    .meta{font-size:12px;letter-spacing:.08em;color:var(--gold2);margin-bottom:8px;word-break:break-all}
    .advice{padding:14px 16px;border-radius:12px;background:rgba(255,250,242,.92);color:#2a1810;white-space:pre-wrap}
    button,a{display:inline-block;border:1px solid var(--line);border-radius:999px;background:rgba(241,217,155,.12);color:var(--gold2);font-family:inherit;font-size:14px;padding:9px 16px;margin:12px 8px 0 0;cursor:pointer;text-decoration:none}
    button:hover,a:hover{background:rgba(241,217,155,.2)}
    .empty{padding:22px;border:1px dashed rgba(241,217,155,.4);border-radius:18px;color:var(--muted);text-align:center}
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>かのんからのアドバイス 復旧ページ</h1>
      <p class="lead">このページは、同じブラウザに保存されている「かのんからのアドバイス」欄だけを一覧で表示します。</p>
      <div class="notice">
        表示された内容をコピーして、該当する方の鑑定書の「かのんからのアドバイス」欄へ戻してください。
        ブラウザに保存が残っている場合のみ表示されます。
      </div>
      <div id="result" aria-live="polite"></div>
      <a href="tsukiyomi_moon_seed_diagnosis.html">鑑定書へ戻る</a>
    </section>
  </main>
  <script>
    function stripHtml(html){
      var box=document.createElement('div');
      box.innerHTML=html||'';
      return (box.innerText||box.textContent||'').trim();
    }
    function parseKey(key){
      var parts=key.split('::');
      return {
        personKey:parts[1]||'',
        name:parts[2]||'',
        birth:parts[3]||'',
        shuku:parts[4]||''
      };
    }
    function render(){
      var result=document.getElementById('result');
      var rows=[];
      for(var i=0;i<localStorage.length;i++){
        var key=localStorage.key(i);
        if(!key || key.indexOf('tsukiyomiMoonSeedKanonMessage::')!==0)continue;
        var html=localStorage.getItem(key)||'';
        var text=stripHtml(html);
        if(!text)continue;
        rows.push({key:key,meta:parseKey(key),html:html,text:text});
      }
      rows.sort(function(a,b){return (a.meta.name||'').localeCompare(b.meta.name||'', 'ja');});
      if(!rows.length){
        result.innerHTML='<div class="empty">保存されている「かのんからのアドバイス」は見つかりませんでした。</div>';
        return;
      }
      result.innerHTML=rows.map(function(row,idx){
        var label=[
          row.meta.name?('お名前：'+row.meta.name):'お名前：未記録',
          row.meta.birth?('生年月日：'+row.meta.birth):'生年月日：未記録',
          row.meta.shuku?('本命宿：'+row.meta.shuku):'本命宿：未記録',
          row.meta.personKey?('ID/メール：'+row.meta.personKey):''
        ].filter(Boolean).join(' ／ ');
        return '<article class="entry">'+
          '<div class="meta">'+label+'</div>'+
          '<div class="advice" id="advice-'+idx+'">'+row.text.replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c];})+'</div>'+
          '<button type="button" data-copy="'+idx+'">このアドバイスをコピー</button>'+
        '</article>';
      }).join('');
      result.querySelectorAll('[data-copy]').forEach(function(btn){
        btn.addEventListener('click',function(){
          var target=document.getElementById('advice-'+btn.getAttribute('data-copy'));
          var text=target?target.innerText:'';
          if(navigator.clipboard){
            navigator.clipboard.writeText(text).then(function(){btn.textContent='コピーしました';});
          }else{
            prompt('以下をコピーしてください',text);
          }
        });
      });
    }
    render();
  </script>
</body>
</html>
