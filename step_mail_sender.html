const EMAIL_PFX  = 'gmailSender::email::';
const SENT_PFX   = 'stepMail::sent::day';
const SUBJ_PFX   = 'stepMail::subj::day';
const BODY_PFX   = 'stepMail::body::day';

let currentDay = 2;

function pidOf(no){
  return String(no).padStart(3, '0');
}

function getDayUrl(no, day){
  return BASE_URL + 'challenge_day' + day + '_sync.html?pid=' + pidOf(no);
}

function loadTemplate(day){
  const cfg = DAY_CONFIGS[day];
  const subj = localStorage.getItem(SUBJ_PFX + day) || cfg.subject;
  const body = localStorage.getItem(BODY_PFX + day) || cfg.body;
  document.getElementById('tmpl_subj').value = subj;
  document.getElementById('tmpl_body').value = body;
  document.getElementById('tmpl-title').textContent = '📝 ' + cfg.title + ' メールテンプレート（編集可）';
}

function saveTemplate(day){
  localStorage.setItem(SUBJ_PFX + day, document.getElementById('tmpl_subj').value);
  localStorage.setItem(BODY_PFX + day, document.getElementById('tmpl_body').value);
}

function buildSubject(m){
  return document.getElementById('tmpl_subj').value.replace(/{{name}}/g, m.name);
}

function buildBody(m, day){
  const tmpl = document.getElementById('tmpl_body').value;
  return tmpl
    .replace(/{{name}}/g, m.name)
    .replace(/{{url}}/g, getDayUrl(m.no, day));
}

function copyTextFallback(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}

function showCopyModal(body, email, subj){
  let overlay = document.getElementById('copy-overlay');
  if(overlay) overlay.remove();
  overlay = document.createElement('div');
  overlay.id = 'copy-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;display:flex;align-items:flex-end;justify-content:center;padding:0';
  overlay.innerHTML =
    '<div style="background:#0d1133;border:1px solid rgba(241,217,155,.4);border-radius:20px 20px 0 0;padding:20px 18px 32px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto">'
    + '<div style="width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 16px"></div>'
    + '<div style="color:#f1d99b;font-size:.95rem;font-weight:bold;margin-bottom:12px">📋 本文をコピーしてGmailに貼り付けてください</div>'
    + '<textarea id="modal-body" style="width:100%;height:180px;background:#060918;color:#ddd;border:1px solid rgba(241,217,155,.25);border-radius:8px;padding:10px;font-size:13px;line-height:1.7;resize:none;font-family:inherit">'
    + body.replace(/</g,'&lt;').replace(/>/g,'&gt;')
    + '</textarea>'
    + '<div style="display:flex;flex-direction:column;gap:10px;margin-top:14px">'
    + '<button id="btn-copy" style="background:linear-gradient(90deg,#f1d99b,#d8b56d);color:#0b0e2a;border:none;border-radius:10px;padding:14px 20px;font-size:15px;font-weight:bold;cursor:pointer;width:100%;font-family:inherit">① 本文をコピー</button>'
    + '<button id="btn-open" style="background:linear-gradient(90deg,#ea4335,#c62828);color:#fff;border:none;border-radius:10px;padding:14px 20px;font-size:15px;font-weight:bold;cursor:pointer;width:100%;font-family:inherit" disabled>② Gmailを開く →</button>'
    + '<button onclick="document.getElementById(\'copy-overlay\').remove()" style="background:transparent;color:#888;border:1px solid #444;border-radius:10px;padding:12px 16px;font-size:14px;cursor:pointer;width:100%;font-family:inherit">閉じる</button>'
    + '</div>'
    + '<div id="copy-hint" style="color:#888;font-size:12px;margin-top:12px;text-align:center">まず「① 本文をコピー」→ 次に「② Gmailを開く」</div>'
    + '</div>';
  document.body.appendChild(overlay);

  document.getElementById('btn-copy').addEventListener('click', function(){
    const rawBody = document.getElementById('modal-body').value;
    copyTextFallback(rawBody);
    if(navigator.clipboard){ navigator.clipboard.writeText(rawBody).catch(function(){}); }
    this.textContent = '✅ コピーしました！';
    this.style.background = 'linear-gradient(90deg,#6ddc8a,#3aaf5c)';
    document.getElementById('btn-open').disabled = false;
    document.getElementById('copy-hint').style.color = '#f1d99b';
    document.getElementById('copy-hint').textContent = '次に「② Gmailを開く」→ Gmailの本文欄をクリック → Cmd+V で貼り付けて送信！';
  });

  document.getElementById('btn-open').addEventListener('click', function(){
    const url = 'https://mail.google.com/mail/?view=cm&to='
      + encodeURIComponent(email)
      + '&su=' + encodeURIComponent(subj);
    window.open(url, '_blank');
    document.getElementById('copy-overlay').remove();
  });
}

function openGmail(i){
  const m = MEMBERS[i];
  const email = document.getElementById('email_'+i).value.trim();
  if(!email){ alert('メールアドレスを入力してください'); return; }
  const subj = buildSubject(m);
  const body = buildBody(m, currentDay);
  showCopyModal(body, email, subj);
}

function sentKey(day, i){ return SENT_PFX + day + '::' + i; }

function toggleSent(i){
  const chk   = document.getElementById('chk_'+i);
  const card  = document.getElementById('card_'+i);
  const lbl   = document.getElementById('sentlbl_'+i);
  localStorage.setItem(sentKey(currentDay, i), chk.checked ? '1' : '');
  card.classList.toggle('sent', chk.checked);
  lbl.textContent = chk.checked ? '送信済み ✅' : '未送信';
  lbl.className = chk.checked ? 'sent-label' : 'unsent-label';
  updateProgress();
}

function updateProgress(){
  const sent = MEMBERS.filter(function(_,i){ return localStorage.getItem(sentKey(currentDay,i))==='1'; }).length;
  const pct = sent / MEMBERS.length * 100;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('plabel').textContent = 'Day' + currentDay + '：' + sent + ' / ' + MEMBERS.length + ' 送信済み';
}

function renderGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  MEMBERS.forEach(function(m, i){
    const savedEmail = localStorage.getItem(EMAIL_PFX + i) || m.email || '';
    const isSent = localStorage.getItem(sentKey(currentDay, i)) === '1';
    const card = document.createElement('div');
    card.className = 'card' + (isSent ? ' sent' : '');
    card.id = 'card_' + i;
    card.innerHTML =
      '<div class="card-header">'
        + '<span class="no">' + m.no + '</span>'
        + '<span class="name">' + m.name + '</span>'
        + '<span class="shuku">' + m.shuku + '</span>'
      + '</div>'
      + '<div style="font-size:11px;color:#666;margin-bottom:8px">Day' + currentDay + ' URL: challenge_day' + currentDay + '_sync.html?pid=' + pidOf(m.no) + '</div>'
      + '<div class="email-row">'
        + '<input class="email-input" id="email_' + i + '" type="email" placeholder="メールアドレス" value="' + savedEmail + '">'
        + '<button class="btn-gmail" onclick="openGmail(' + i + ')">Gmailで開く</button>'
      + '</div>'
      + '<div class="sent-row">'
        + '<input type="checkbox" class="chk" id="chk_' + i + '"' + (isSent ? ' checked' : '') + ' onchange="toggleSent(' + i + ')">'
        + '<span id="sentlbl_' + i + '" class="' + (isSent ? 'sent-label' : 'unsent-label') + '">' + (isSent ? '送信済み ✅' : '未送信') + '</span>'
      + '</div>';
    grid.appendChild(card);

    document.getElementById('email_' + i).addEventListener('input', function(){
      localStorage.setItem(EMAIL_PFX + i, this.value);
    });
  });
}

function selectDay(day){
  currentDay = day;
  document.querySelectorAll('.day-tab').forEach(function(btn){
    btn.classList.toggle('active', parseInt(btn.dataset.day) === day);
  });
  loadTemplate(day);
  renderGrid();
  updateProgress();
}

document.getElementById('day-tabs').addEventListener('click', function(e){
  const btn = e.target.closest('.day-tab');
  if(!btn) return;
  selectDay(parseInt(btn.dataset.day));
});

document.getElementById('tmpl_subj').addEventListener('input', function(){ saveTemplate(currentDay); });
document.getElementById('tmpl_body').addEventListener('input', function(){ saveTemplate(currentDay); });

selectDay(2);
</script>
</body>
</html>
